<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#0b0f1a;
      color:white;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:25px 10px;
      background:#111827;
    }

    .header img{
      width:60px;
      border-radius:12px;
    }

    .header h2{
      margin:5px 0 0;
    }

    .header p{
      margin:0;
      font-size:12px;
      color:#9ca3af;
    }

    /* LOGIN AREA */
    .container{
      padding:20px;
      margin-top:20px;
    }

    .login-box{
      width:100%;
    }

    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      font-size:14px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      font-size:14px;
      cursor:pointer;
    }

    .login-btn{
      background:#22c55e;
      color:white;
    }

    .google-btn{
      background:#4285F4;
      color:white;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:20px;
      font-size:12px;
      color:#9ca3af;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png">
  <h2>StackX</h2>
  <p>Play Smart. Win Big.</p>
</div>

<!-- LOGIN -->
<div class="container">
  <div class="login-box">

    <input type="text" placeholder="User ID">
    <input type="password" placeholder="Password">

    <button class="login-btn" onclick="manualLogin()">Login</button>

    <button class="google-btn" id="googleBtn">Login with Google</button>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  StackX is a fantasy gaming platform where users create teams,
  compete and win exciting rewards 🔥
</div>

<!-- FIREBASE (MODERN) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
    authDomain: "stackx-9f92e.firebaseapp.com",
    projectId: "stackx-9f92e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // GOOGLE LOGIN
  document.getElementById("googleBtn").addEventListener("click", async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      alert("Login Success: " + result.user.email);
      window.location.href = "home.html";
    } catch (error) {
      alert(error.message);
    }
  });

  // AUTO LOGIN CHECK
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log("Already logged in:", user.email);
    }
  });

  // MANUAL LOGIN (dummy)
  window.manualLogin = function(){
    alert("Manual login (demo)");
  }
</script>

</body>
</html>
