<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      overflow-x:hidden;
    }

    /* 🔥 Glow Background */
    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(255,0,80,0.25), transparent 70%);
      top:-200px;
      left:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(0,150,255,0.25), transparent 70%);
      bottom:-200px;
      right:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:30px 10px;
    }

    .header img{
      width:70px;
      border-radius:15px;
    }

    .header h2{margin-top:8px;font-weight:800;}
    .header p{
      font-size:13px;
      color:#9ca3af;
    }

    /* IPL BANNER */
    .banner{
      margin:20px;
      padding:25px;
      border-radius:20px;
      background:linear-gradient(135deg,#ff2a2a,#ff7a00);
      text-align:center;
    }

    .banner h3{
      font-size:22px;
      margin-bottom:10px;
    }

    .banner p{
      font-size:13px;
      opacity:0.9;
    }

    /* LOGIN BOX */
    .container{
      padding:20px;
      margin-top:10px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:20px;
    }

    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:12px;
      font-weight:600;
      cursor:pointer;
    }

    .login-btn{
      background:#22c55e;
      color:white;
    }

    .google-btn{
      background:#4285F4;
      color:white;
    }

    /* FOOTER */
    .footer{
      text-align:center;
      padding:25px;
      font-size:12px;
      color:#9ca3af;
    }

    /* FLOAT BUTTON */
    .wa{
      position:fixed;
      right:20px;
      bottom:20px;
      background:#25D366;
      padding:12px 16px;
      border-radius:50px;
      text-decoration:none;
      font-weight:600;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <h2>StackX</h2>
  <p>Play Smart. Win Big.</p>
</div>

<!-- 🔥 IPL PROMO -->
<div class="banner">
  <h3>🏏Cricket Fantasy League 2026</h3>
  <p>Predict matches, win big rewards & compete with players across India 🔥</p>
</div>

<div class="container">
  <div class="card">

    <input type="text" placeholder="User ID">
    <input type="password" placeholder="Password">

    <button class="login-btn" onclick="manualLogin()">Login</button>
    <button class="google-btn" id="googleBtn">Login with Google</button>

  </div>
</div>

<div class="footer">
  StackX is a fantasy gaming platform where users create teams,
  compete and win exciting rewards 🔥
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);

// 🔥 SESSION SAVE (IMPORTANT)
await setPersistence(auth, browserLocalPersistence);

const provider = new GoogleAuthProvider();

// ✅ GOOGLE LOGIN
document.getElementById("googleBtn").onclick = async () => {
  try {
    const result = await signInWithPopup(auth, provider);

    if(result.user.email === "18stackx@gmail.com"){
      window.location.href = "admin.html";
    } else {
      window.location.href = "home.html";
    }

  } catch (err) {
    alert(err.message);
  }
};

// ✅ AUTO REDIRECT
onAuthStateChanged(auth, (user)=>{
  if(user){
    if(user.email === "18stackx@gmail.com"){
      window.location.href = "admin.html";
    } else {
      window.location.href = "home.html";
    }
  }
});

// dummy
window.manualLogin = ()=>{
  alert("Manual login (demo)");
};
</script>

</body>
</html>
