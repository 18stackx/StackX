<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>

  <style>
    body{
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#0b0f1a;
      color:white;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 15px;
      background:#111827;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo img{
      width:40px;
      border-radius:8px;
    }

    .btn{
      background:#22c55e;
      border:none;
      padding:8px 14px;
      border-radius:8px;
      color:white;
      cursor:pointer;
    }

    .hero{
      background:url("https://wallpapercave.com/wp/wp9535412.jpg") center/cover;
      padding:40px 20px;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .players button{
      margin:5px;
      padding:8px;
      border:none;
      border-radius:6px;
      background:#374151;
      color:white;
      cursor:pointer;
    }

    .team{
      background:#111827;
      padding:10px;
      border-radius:10px;
    }

    .box{
      background:#111827;
      padding:10px;
      margin:8px 0;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="logo.png">
    <div>
      <div>StackX</div>
      <small>Play Smart. Win Big.</small>
    </div>
  </div>

  <button class="btn" id="loginBtn">Login</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Play Smart. Win Big.</h1>
  <p>Create your fantasy team & win rewards 🔥</p>
</div>

<div class="container">

  <div class="card">
    <h3>RCB vs CSK</h3>
    <p style="color:red;">LIVE</p>
  </div>

  <div class="card">
    <h3>Select Team</h3>
    <div id="players" class="players"></div>
  </div>

  <div class="card">
    <h3>Your Team</h3>
    <div class="team">
      <ul id="team"></ul>
    </div>
    <button class="btn" onclick="submitTeam()">Submit Team</button>
  </div>

  <div class="card">
    <h3>Leaderboard</h3>
    <div id="leaderboard">
      <div class="box">Abhi - 120 pts</div>
      <div class="box">Rahul - 98 pts</div>
    </div>
  </div>

</div>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain: "stackx-9f92e.firebaseapp.com",
  projectId: "stackx-9f92e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN BUTTON CLICK
document.getElementById("loginBtn").addEventListener("click", function(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
});

// USER DETECT (IMPORTANT)
auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById("loginBtn").innerText = user.email;
  }
});

// PLAYERS
let team = [];
const players = ["Virat","Rohit","Dhoni","Gill","Hardik","KL Rahul","Sky"];

players.forEach(p=>{
  let btn = document.createElement("button");
  btn.innerText = p;
  btn.onclick = ()=>addPlayer(p);
  document.getElementById("players").appendChild(btn);
});

function addPlayer(name){
  if(team.includes(name)){
    alert("Already selected");
    return;
  }
  if(team.length < 11){
    team.push(name);
    showTeam();
  }
}

function showTeam(){
  let html = "";
  team.forEach(p=>{
    html += "<li>"+p+"</li>";
  });
  document.getElementById("team").innerHTML = html;
}

function submitTeam(){
  alert("Team Submitted 🔥");
}
</script>

</body>
</html>
