<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <style>
    body{
      background:#0f172a;
      color:white;
      text-align:center;
      font-family:Arial;
    }

    img{
      width:140px;
      margin-top:20px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-size:14px;
    }

    .box{
      background:#1e293b;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<img src="logo.png">
<h1>StackX</h1>
<p>Play Smart. Win Big.</p>

<button onclick="login()">Login with Google</button>
<p id="user"></p>

<h3>Select Team</h3>
<div id="players"></div>

<h4>Your Team</h4>
<ul id="team"></ul>

<button onclick="submitTeam()">Submit Team</button>

<h3>Leaderboard</h3>
<div id="leaderboard"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain: "stackx-9f92e.firebaseapp.com",
  projectId: "stackx-9f92e",
  storageBucket: "stackx-9f92e.firebasestorage.app",
  messagingSenderId: "463571776687",
  appId: "1:463571776687:web:16e07abfd0900b8bfc505a"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let userEmail = "";
let team = [];

// LOGIN (mobile friendly)
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithRedirect(provider);
}

// GET USER AFTER LOGIN
auth.getRedirectResult().then(result=>{
  if(result.user){
    userEmail = result.user.email;
    document.getElementById("user").innerText = "Logged in: " + userEmail;
  }
});

// LOAD PLAYERS
window.onload = function(){
  const players = ["Virat","Rohit","Dhoni","Gill","Hardik","KL Rahul","Sky","Jadeja"];

  const container = document.getElementById("players");

  players.forEach(p=>{
    let btn = document.createElement("button");
    btn.innerText = p;
    btn.onclick = ()=>addPlayer(p);
    container.appendChild(btn);
  });

  loadLeaderboard();
};

// ADD PLAYER
function addPlayer(name){
  if(team.includes(name)){
    alert("Already selected");
    return;
  }

  if(team.length < 11){
    team.push(name);
    showTeam();
  } else {
    alert("Team full");
  }
}

// SHOW TEAM
function showTeam(){
  let html = "";
  team.forEach(p=>{
    html += "<li>"+p+"</li>";
  });
  document.getElementById("team").innerHTML = html;
}

// SAVE TEAM
function submitTeam(){
  if(team.length === 0){
    alert("Select team first");
    return;
  }

  db.collection("teams").add({
    user: userEmail || "guest",
    players: team,
    points: Math.floor(Math.random()*100)
  })
  .then(()=>{
    alert("Team Saved 🔥");
    loadLeaderboard();
  });
}

// LEADERBOARD
function loadLeaderboard(){
  db.collection("teams")
  .orderBy("points","desc")
  .get()
  .then(snapshot=>{
    let html = "";
    snapshot.forEach(doc=>{
      let d = doc.data();
      html += `<div class="box">${d.user}<br>Points: ${d.points}</div>`;
    });
    document.getElementById("leaderboard").innerHTML = html;
  });
}
</script>

</body>
</html>
