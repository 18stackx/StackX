<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      text-align:center;
      padding:15px;
      background:#111827;
    }

    .header img{
      width:50px;
      border-radius:10px;
    }

    .container{
      display:flex;
      justify-content:center;
      align-items:center;
      height:70vh;
    }

    .login-box{
      background:#1f2937;
      padding:20px;
      border-radius:12px;
      width:280px;
      text-align:center;
    }

    input{
      width:90%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .google{
      background:#4285F4;
    }

    .footer{
      text-align:center;
      padding:15px;
      font-size:12px;
      color:#9ca3af;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo.png">
  <h2>StackX</h2>
  <p>Play Smart. Win Big.</p>
</div>

<!-- LOGIN BOX -->
<div class="container">
  <div class="login-box">

    <h3>Login</h3>

    <input type="text" placeholder="User ID">
    <input type="password" placeholder="Password">

    <button onclick="manualLogin()">Login</button>

    <button class="google" id="googleBtn">Login with Google</button>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  StackX is a fantasy gaming platform where users can create teams,
  compete with others and win exciting rewards.
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain: "stackx-9f92e.firebaseapp.com",
  projectId: "stackx-9f92e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// GOOGLE LOGIN FIX
document.getElementById("googleBtn").addEventListener("click", function(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
});

// USER DETECT
auth.onAuthStateChanged(function(user){
  if(user){
    alert("Logged in as " + user.email);
    window.location.href = "home.html"; // next page
  }
});

// MANUAL LOGIN (temporary)
function manualLogin(){
  alert("Manual login (demo)");
}
</script>

</body>
</html>
