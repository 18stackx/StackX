<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background:#0b0f1a;
      color:white;
    }

    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:url('logo.png') no-repeat center;
      background-size:200px;
      opacity:0.08;
      filter:blur(2px);
      z-index:-1;
    }

    .header{
      text-align:center;
      padding:25px 10px;
      background:#111827;
    }

    .header img{
      width:60px;
      border-radius:12px;
    }

    .header h2{margin:5px 0 0;}
    .header p{
      margin:0;
      font-size:12px;
      color:#9ca3af;
    }

    .container{padding:20px;margin-top:20px;}

    input{
      width:100%;
      padding:14px;
      margin:10px 0;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .login-btn{background:#22c55e;color:white;}
    .google-btn{background:#4285F4;color:white;}

    .footer{
      text-align:center;
      padding:20px;
      font-size:12px;
      color:#9ca3af;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <h2>StackX</h2>
  <p>Play Smart. Win Big.</p>
</div>

<div class="container">

  <input type="text" placeholder="User ID">
  <input type="password" placeholder="Password">

  <button class="login-btn" onclick="manualLogin()">Login</button>
  <button class="google-btn" id="googleBtn">Login with Google</button>

</div>

<div class="footer">
  StackX is a fantasy gaming platform where users create teams,
  compete and win exciting rewards 🔥
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);

// 🔥 MOST IMPORTANT LINE
await setPersistence(auth, browserLocalPersistence);

const provider = new GoogleAuthProvider();

// ✅ GOOGLE LOGIN
document.getElementById("googleBtn").onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
    window.location.href = "home.html";
  } catch (err) {
    alert(err.message);
  }
};

// ✅ AUTO LOGIN REDIRECT
onAuthStateChanged(auth, (user)=>{
  if(user){
    window.location.href = "home.html";
  }
});

// dummy
window.manualLogin = ()=>{
  alert("Manual login (demo)");
};
</script>

</body>
</html>
