<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>

  <style>
    body{
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#0b0f1a;
      color:white;
    }

    /* HEADER */
    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
      background:#111827;
    }

    .logo{
      font-size:22px;
      font-weight:bold;
      color:#22c55e;
    }

    .btn{
      background:#22c55e;
      border:none;
      padding:8px 14px;
      border-radius:8px;
      color:white;
    }

    /* HERO */
    .hero{
      background:url("https://wallpapercave.com/wp/wp9535412.jpg") center/cover;
      padding:40px 20px;
      text-align:left;
    }

    .hero h1{
      margin:0;
      font-size:28px;
    }

    .hero p{
      color:#d1d5db;
      margin-top:5px;
    }

    /* CONTAINER */
    .container{
      padding:15px;
    }

    /* CARD */
    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    /* MATCH CARD */
    .match{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .live{
      color:red;
      font-weight:bold;
    }

    /* PLAYERS */
    .players button{
      margin:5px;
      padding:8px;
      border:none;
      border-radius:6px;
      background:#374151;
      color:white;
    }

    /* TEAM */
    .team{
      background:#111827;
      padding:10px;
      border-radius:10px;
    }

    /* LEADERBOARD */
    .box{
      background:#111827;
      padding:10px;
      margin:8px 0;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🚀 StackX</div>
  <button class="btn">Login</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Play Smart. Win Big.</h1>
  <p>Create your fantasy team & compete with others 🔥</p>
</div>

<div class="container">

  <!-- MATCH CARD -->
  <div class="card match">
    <div>
      <h3>RCB vs CSK</h3>
      <p class="live">LIVE • 2h 15m left</p>
    </div>
    <button class="btn">Join</button>
  </div>

  <!-- TEAM SELECT -->
  <div class="card">
    <h3>Select Your Team</h3>
    <div id="players" class="players"></div>
  </div>

  <!-- YOUR TEAM -->
  <div class="card">
    <h3>Your Team</h3>
    <div class="team">
      <ul id="team"></ul>
    </div>
    <button class="btn" onclick="submitTeam()">Submit Team</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="card">
    <h3>Top Players</h3>
    <div id="leaderboard">
      <div class="box">Abhi - 120 pts</div>
      <div class="box">Rahul - 98 pts</div>
    </div>
  </div>

</div>

<script>
let team = [];

const players = ["Virat","Rohit","Dhoni","Gill","Hardik","KL Rahul","Sky"];

players.forEach(p=>{
  let btn = document.createElement("button");
  btn.innerText = p;
  btn.onclick = ()=>addPlayer(p);
  document.getElementById("players").appendChild(btn);
});

function addPlayer(name){
  if(team.includes(name)){
    alert("Already selected");
    return;
  }

  if(team.length < 11){
    team.push(name);
    showTeam();
  }
}

function showTeam(){
  let html = "";
  team.forEach(p=>{
    html += "<li>"+p+"</li>";
  });
  document.getElementById("team").innerHTML = html;
}

function submitTeam(){
  alert("Team Submitted 🔥");
}
</script>

</body>
</html>
