<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .box{
      background:#1f2937;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    input{
      width:80%;
      padding:10px;
      margin:8px;
      border-radius:8px;
      border:none;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      width:85%;
      margin-top:10px;
    }

    .note{
      font-size:13px;
      color:#9ca3af;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h2>💰 Wallet</h2>

<!-- BALANCE -->
<div class="box">
  <h3>Balance: ₹<span id="bal">0</span></h3>
</div>

<!-- ADD MONEY -->
<div class="box">
  <h3>➕ Add Money</h3>

  <p>Pay to UPI ID:</p>
  <b>yourupi@upi</b>

  <input id="amt" placeholder="Enter Amount">
  <input id="txn" placeholder="Transaction ID">

  <button onclick="submitAdd()">Submit Payment</button>

  <p class="note">
    ⚠️ Pay above UPI ID and submit details.  
    Then message on Telegram for verification.  
    After verification, balance will be updated.
  </p>
</div>

<!-- WITHDRAW -->
<div class="box">
  <h3>💸 Withdraw</h3>

  <input id="upi" placeholder="Your UPI ID">
  <input id="wamt" placeholder="Enter Amount">

  <button onclick="submitWithdraw()">Request Withdraw</button>

  <p class="note">
    ⚠️ After request, message on Telegram.  
    Amount will be sent manually after verification.
  </p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

let userEmail;

// 🔥 LOAD BALANCE
onAuthStateChanged(auth, async (user)=>{
  if(user){
    userEmail = user.email;

    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("bal").innerText = snap.data().balance || 0;
    }
  }
});

// ➕ ADD MONEY
window.submitAdd = ()=>{
  let amt = document.getElementById("amt").value;
  let txn = document.getElementById("txn").value;

  if(!amt || !txn){
    alert("Fill all details ❌");
    return;
  }

  alert("Submitted ✅\nNow message on Telegram with screenshot.");

  // 👉 future: store request in firebase
};

// 💸 WITHDRAW
window.submitWithdraw = ()=>{
  let upi = document.getElementById("upi").value;
  let amt = document.getElementById("wamt").value;

  if(!upi || !amt){
    alert("Fill all details ❌");
    return;
  }

  alert("Withdraw Request Sent ✅\nNow message on Telegram.");

  // 👉 future: store request in firebase
};
</script>

</body>
</html>
