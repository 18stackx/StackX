<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      text-align:center;
      padding-bottom:80px;
      display:none;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{width:40px;border-radius:10px;}
    .trusted{font-size:12px;color:#22c55e;}

    h2{margin-top:10px;}

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
    }

    input{
      width:85%;
      padding:12px;
      margin:8px;
      border-radius:10px;
      border:none;
    }

    button{
      padding:12px;
      border:none;
      border-radius:30px;
      background:#ff2a2a;
      color:white;
      width:90%;
      margin-top:10px;
    }

    .note{
      font-size:13px;
      color:#9ca3af;
      margin-top:10px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }

    .tg{
      position:fixed;
      bottom:90px;
      right:15px;
      background:#0088cc;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tg img{width:28px;}
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h2>💰 Wallet</h2>

<div class="box">
  <h3>Balance: ₹<span id="bal">0</span></h3>
</div>

<div class="box">
  <h3>➕ Add Money</h3>

  <b>UPI: yourupi@upi</b>

  <img src="qr.jpg" width="150" style="margin-top:10px;border-radius:10px;">

  <input id="amt" placeholder="Amount (min ₹300)">
  <input id="txn" placeholder="Transaction ID">

  <button onclick="submitAdd()">Submit Payment</button>

  <p class="note">After payment → message Telegram</p>
</div>

<div class="box">
  <h3>💸 Withdraw</h3>

  <input id="upi" placeholder="Your UPI">
  <input id="wamt" placeholder="Amount (min ₹700)">

  <button onclick="submitWithdraw()">Withdraw</button>

  <!-- 🔥 ADDED NOTE -->
  <p class="note">⚠️ Minimum 3 bets required before withdrawal</p>
</div>

<a href="https://t.me/stackx_admin" target="_blank" class="tg">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// LOAD BALANCE
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="index.html";
  } else {
    document.body.style.display="block";

    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("bal").innerText = snap.data().balance || 0;
    }
  }
});

// 🔥 ADD MONEY
window.submitAdd = async function(){

  let amt = parseInt(document.getElementById("amt").value);
  let txn = document.getElementById("txn").value;

  if(!amt || !txn){
    alert("Fill all details ❌");
    return;
  }

  if(amt < 300){
    alert("Min ₹300 ❌");
    return;
  }

  const user = auth.currentUser;
  const ref = doc(db,"users",user.email);

  let snap = await getDoc(ref);
  let data = snap.data() || {};

  await setDoc(ref,{
    deposit:(data.deposit||0)+amt,
    history:[
      ...(data.history||[]),
      {
        type:"deposit",
        amt:amt,
        time:new Date().toLocaleString('en-IN')
      }
    ]
  },{merge:true});

  alert("Submitted ✅\nMessage Telegram");
};

// 🔥 WITHDRAW (3 BET LOCK)
window.submitWithdraw = async function(){

  let upi = document.getElementById("upi").value;
  let amt = parseInt(document.getElementById("wamt").value);

  if(!upi || !amt){
    alert("Fill all ❌");
    return;
  }

  if(amt < 700){
    alert("Min ₹700 ❌");
    return;
  }

  const user = auth.currentUser;
  const ref = doc(db,"users",user.email);

  let snap = await getDoc(ref);
  let data = snap.data();

  // 🔒 3 BET CONDITION
  if((data.betsCount || 0) < 3){
    alert("⚠️ Minimum 3 bets required before withdrawal");
    return;
  }

  let bal = data.balance || 0;

  if(bal < amt){
    alert("Low balance ❌");
    return;
  }

  await setDoc(ref,{
    balance:bal-amt,
    history:[
      ...(data.history||[]),
      {
        type:"withdraw",
        amt:amt,
        time:new Date().toLocaleString('en-IN')
      }
    ]
  },{merge:true});

  alert("Withdraw Sent ✅\nMessage Telegram");
};

// NAV
window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";
</script>

</body>
</html>
