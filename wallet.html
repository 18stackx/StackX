<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;text-align:center;}

    .box{
      background:#1f2937;
      margin:20px;
      padding:20px;
      border-radius:10px;
    }

    input{
      padding:10px;
      width:80%;
      margin:10px;
      border-radius:8px;
      border:none;
    }

    button{
      padding:10px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      color:white;
    }
  </style>
</head>

<body>

<h2>💰 Wallet</h2>

<div class="box">
  <h3>Balance: ₹<span id="bal">0</span></h3>

  <input id="amt" placeholder="Enter amount">
  <br>
  <button onclick="addMoney()">Add Money</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

let userRef;

onAuthStateChanged(auth, async (user)=>{
  if(user){
    userRef = doc(db,"users",user.email);
    let snap = await getDoc(userRef);

    if(snap.exists()){
      document.getElementById("bal").innerText = snap.data().balance || 0;
    }
  }
});

window.addMoney = async ()=>{
  let amt = parseInt(document.getElementById("amt").value);

  if(!amt){
    alert("Enter amount");
    return;
  }

  let snap = await getDoc(userRef);
  let old = snap.data().balance || 0;

  await updateDoc(userRef,{
    balance: old + amt
  });

  alert("Money Added 💰");
  location.reload();
};
</script>

</body>
</html>
