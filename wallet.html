<!DOCTYPE html>
<html>
<head>
  <title>Wallet - StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      padding:15px;
      background:#111827;
      text-align:center;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .balance{
      font-size:28px;
      font-weight:bold;
      margin:20px 0;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:#111827;
    }

    .nav button{
      flex:1;
      padding:12px;
      border:none;
      background:none;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>💰 Wallet</h2>
</div>

<div class="container">

  <div class="card">
    <h3>Your Balance</h3>
    <div class="balance">₹<span id="balance">0</span></div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goWallet()">💰 Wallet</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 FETCH BALANCE
auth.onAuthStateChanged(async (user)=>{
  if(user){
    const ref = doc(db,"users",user.email);
    const snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance;
    } else {
      document.getElementById("balance").innerText = 0;
    }
  }
});

// NAV
window.goHome = () => window.location.href="home.html";
window.goProfile = () => window.location.href="profile.html";
window.goWallet = () => window.location.href="wallet.html";
</script>

</body>
</html>
