<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding-bottom:70px;
      display:none;
    }

    .box{
      background:#1f2937;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    input{
      width:80%;
      padding:10px;
      margin:8px;
      border-radius:8px;
      border:none;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      width:85%;
      margin-top:10px;
      font-weight:bold;
    }

    .note{
      font-size:13px;
      color:#9ca3af;
      margin-top:10px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>💰 Wallet</h2>

<div class="box">
  <h3>Balance: ₹<span id="bal">0</span></h3>
</div>

<div class="box">
  <h3>➕ Add Money</h3>

  <p>Pay to UPI ID:</p>
  <b>yourupi@upi</b>

  <input id="amt" placeholder="Enter Amount (min ₹300)">
  <input id="txn" placeholder="Transaction ID">

  <button onclick="submitAdd()">Submit Payment</button>

  <p class="note">
    ⚠️ Minimum deposit ₹300.<br>
    Pay → submit → message Telegram → verify → wallet update.
  </p>
</div>

<div class="box">
  <h3>💸 Withdraw</h3>

  <input id="upi" placeholder="Your UPI ID">
  <input id="wamt" placeholder="Enter Amount (min ₹700)">

  <button onclick="submitWithdraw()">Request Withdraw</button>

  <p class="note">
    ⚠️ Minimum withdraw ₹700.<br>
    After request → Telegram → manual transfer.
  </p>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goProfile()">👤 Profile</div>
  <div onclick="goWallet()">💰 Wallet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 AUTH + LOAD BALANCE
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "index.html";
  } else {
    document.body.style.display = "block";

    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("bal").innerText = snap.data().balance || 0;
    }
  }
});

// 🔥 ADD MONEY (REFERRAL SYSTEM)
window.submitAdd = async function(){

  let amt = parseInt(document.getElementById("amt").value);
  let txn = document.getElementById("txn").value;

  if(!amt || !txn){
    alert("Fill all details ❌");
    return;
  }

  if(amt < 300){
    alert("Minimum deposit is ₹300 ❌");
    return;
  }

  const user = auth.currentUser;
  const userRef = doc(db,"users",user.email);

  let userSnap = await getDoc(userRef);
  let data = userSnap.data() || {};

  // 🔥 deposit save
  await setDoc(userRef,{
    deposit: (data.deposit || 0) + amt
  },{ merge:true });

  // 🔥 referral bonus
  if(data.refBy && data.refBy !== user.email.split("@")[0]){

    let refUserRef = doc(db,"users",data.refBy);
    let refSnap = await getDoc(refUserRef);

    if(refSnap.exists()){
      let oldBal = refSnap.data().balance || 0;
      let bonus = Math.floor(amt * 0.10);

      await setDoc(refUserRef,{
        balance: oldBal + bonus
      },{ merge:true });
    }
  }

  alert("Payment Submitted ✅\nNow message on Telegram.");
};

// 💸 WITHDRAW
window.submitWithdraw = function(){
  let upi = document.getElementById("upi").value;
  let amt = parseInt(document.getElementById("wamt").value);

  if(!upi || !amt){
    alert("Fill all details ❌");
    return;
  }

  if(amt < 700){
    alert("Minimum withdrawal is ₹700 ❌");
    return;
  }

  alert("Withdraw Request Sent ✅\nNow message on Telegram.");
};

// NAV
function goHome(){
  window.location.href = "home.html";
}
function goProfile(){
  window.location.href = "profile.html";
}
function goWallet(){
  window.location.href = "wallet.html";
}
</script>

</body>
</html>
