<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding-bottom:70px;
      display:none;
    }

    .box{
      background:#1f2937;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }

    .refbox{
      font-size:14px;
      color:#9ca3af;
      margin-top:10px;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      width:90%;
    }
  </style>
</head>

<body>

<h2>👤 Profile</h2>

<div class="box">
  <p><b>Email:</b> <span id="email"></span></p>
  <p><b>Name:</b> <span id="name"></span></p>
  <p><b>Wallet:</b> ₹<span id="bal">0</span></p>
</div>

<div class="box">
  <h3>🎮 Joined Contests</h3>
  <div id="contests">No contests yet</div>
</div>

<div class="box">
  <h3>🎁 Refer & Earn</h3>

  <p><b>Your Code:</b> <span id="ref"></span></p>
  <p id="link"></p>

  <div class="refbox">
    👉 Get ₹20 bonus when user joins from your link<br>
    👉 Get 10% bonus on their deposits 💸
  </div>

  <button onclick="copyRef()">📋 Copy Referral Link</button>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goProfile()">👤 Profile</div>
  <div onclick="goWallet()">💰 Wallet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href = "index.html";
  } else {

    document.body.style.display = "block";

    let userRef = doc(db,"users",user.email);

    document.getElementById("email").innerText = user.email;
    document.getElementById("name").innerText = user.displayName || "User";

    let snap = await getDoc(userRef);

    if(snap.exists()){
      let data = snap.data();

      document.getElementById("bal").innerText = data.balance || 0;

      document.getElementById("contests").innerText =
        (data.contests || []).join(" , ") || "No contests";

      let refCode = data.ref || user.email.split("@")[0];
      let link = window.location.origin + "?ref=" + refCode;

      document.getElementById("ref").innerText = refCode;
      document.getElementById("link").innerText = link;

      // 🔥 save globally for copy
      window.refLink = link;

    } else {
      await setDoc(userRef,{
        balance:50,
        contests:[],
        ref:user.email.split("@")[0]
      });
    }
  }
});
</script>

<script>
function copyRef(){
  navigator.clipboard.writeText(window.refLink);
  alert("Referral link copied 😈🔥");
}

function goHome(){
  window.location.href = "home.html";
}

function goProfile(){
  window.location.href = "profile.html";
}

function goWallet(){
  window.location.href = "wallet.html";
}
</script>

</body>
</html>
