<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      text-align:center;
      padding-bottom:80px;
    }

    #loader{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:18px;
    }

    body.hidden{display:none;}

    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(255,0,80,0.25), transparent 70%);
      top:-200px;
      left:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(0,150,255,0.25), transparent 70%);
      bottom:-200px;
      right:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    .header{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{width:40px;border-radius:10px;}
    .trusted{font-size:12px;color:#22c55e;}

    h2{margin-top:10px;}

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
      backdrop-filter:blur(10px);
    }

    .historyBox{display:none;margin-top:10px;}

    .historyItem{
      display:flex;
      justify-content:space-between;
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,0.1);
      font-size:13px;
    }

    .left{color:#9ca3af;}
    .center{font-weight:600;}
    .right{font-weight:600;}

    .deposit{color:#22c55e;}
    .withdraw{color:red;}

    button{
      padding:12px;
      border:none;
      border-radius:30px;
      background:#ff2a2a;
      color:white;
      width:90%;
      margin-top:10px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }

    .tg{
      position:fixed;
      bottom:90px;
      right:15px;
      background:#0088cc;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tg img{width:28px;}
  </style>
</head>

<body class="hidden">

<div id="loader">Loading...</div>

<div id="main">

<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h2>👤 Profile</h2>

<div class="box">
  <p>Email: <span id="email"></span></p>
  <p>Name: <span id="name"></span></p>
  <p>Wallet: ₹<span id="bal">0</span></p>
</div>

<div class="box">
  <h3>🎮 Joined Contests</h3>
  <div id="contests">No contests</div>
</div>

<div class="box" onclick="toggleHistory()">
  <h3>📜 Wallet History ⬇️</h3>
  <div id="history" class="historyBox"></div>
</div>

<div class="box">
  <h3>🎁 Refer & Earn</h3>
  <p id="ref"></p>
  <p id="link"></p>
  <button onclick="copyRef()">Copy Link</button>
</div>

</div>

<a href="https://t.me/stackx_admin" target="_blank" class="tg">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIza...",  // 🔥 apna full key daal
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);
const db = getFirestore(app);

// ✅ FINAL AUTH FIX
onAuthStateChanged(auth, async (user)=>{

  if(user){

    document.getElementById("loader").style.display="none";
    document.body.classList.remove("hidden");

    const userRef = doc(db,"users",user.email);

    document.getElementById("email").innerText = user.email;
    document.getElementById("name").innerText = user.displayName || "User";

    const snap = await getDoc(userRef);

    if(snap.exists()){
      const data = snap.data();

      document.getElementById("bal").innerText = data.balance || 0;

      document.getElementById("contests").innerText =
        (data.contests || []).join(", ") || "No contests";

      const refCode = data.ref || user.email.split("@")[0];
      const link = window.location.origin + "?ref=" + refCode;

      document.getElementById("ref").innerText = refCode;
      document.getElementById("link").innerText = link;

      window.refLink = link;

      const historyDiv = document.getElementById("history");

      if(data.history && data.history.length > 0){

        historyDiv.innerHTML = data.history.map(h=>{
          const sign = h.type==="deposit"?"+":"-";
          const type = h.type==="deposit"?"Deposit":"Withdraw";

          return `
          <div class="historyItem">
            <div class="left">${h.time || "--"}</div>
            <div class="center">${type}</div>
            <div class="right ${h.type}">
              ${sign}₹${h.amt}
            </div>
          </div>`;
        }).join("");

      } else {
        historyDiv.innerHTML="No history";
      }
    }

  } else {

    // 🔥 FIXED (NO AUTO LOGOUT)
    setTimeout(()=>{
      if(!auth.currentUser){
        window.location.href="index.html";
      }
    },3000);

  }

});
</script>

<script>
function toggleHistory(){
  let box=document.getElementById("history");
  box.style.display=box.style.display==="block"?"none":"block";
}

function copyRef(){
  navigator.clipboard.writeText(window.refLink);
  alert("Referral link copied 😈");
}

window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";
</script>

</body>
</html>
