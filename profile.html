<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      text-align:center;
      padding:20px;
      background:#111827;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .title{
      font-size:14px;
      color:#9ca3af;
      margin-bottom:5px;
    }

    .value{
      font-size:18px;
      font-weight:bold;
    }

    .row{
      display:flex;
      justify-content:space-between;
      text-align:center;
    }

    .box{
      flex:1;
      margin:5px;
      background:#111827;
      padding:10px;
      border-radius:10px;
    }

    .logout{
      width:100%;
      padding:12px;
      background:red;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
    }

    /* bottom nav */
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:#111827;
    }

    .nav button{
      flex:1;
      padding:12px;
      border:none;
      background:none;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>👤 My Profile</h2>
</div>

<div class="container">

  <!-- USER INFO -->
  <div class="card">
    <div class="title">User Info</div>
    <div class="value" id="email">Loading...</div>
  </div>

  <!-- STATS -->
  <div class="card">
    <div class="title">📊 Stats</div>
    <div class="row">
      <div class="box">
        <div>Contests</div>
        <div>12</div>
      </div>
      <div class="box">
        <div>Wins</div>
        <div>3</div>
      </div>
      <div class="box">
        <div>Points</div>
        <div>540</div>
      </div>
    </div>
  </div>

  <!-- WALLET -->
  <div class="card">
    <div class="title">💰 Wallet</div>
    <div class="value">₹100</div>
  </div>

  <!-- MY TEAMS -->
  <div class="card">
    <div class="title">📜 My Teams</div>
    <div>Team 1 - Virat, Rohit, Dhoni</div>
    <div>Team 2 - Gill, Hardik</div>
  </div>

  <!-- LOGOUT -->
  <button class="logout" id="logoutBtn">Logout</button>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);

// USER SHOW
onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("email").innerText = user.email;
  } else {
    window.location.href = "index.html";
  }
});

// LOGOUT
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};

// NAV
window.goHome = () => window.location.href="home.html";
window.goProfile = () => window.location.href="profile.html";
</script>

</body>
</html>
