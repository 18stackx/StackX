<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding-bottom:70px; /* 🔥 nav space */
    }

    .box{
      background:#1f2937;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    img{
      width:80px;
      height:80px;
      border-radius:50%;
      margin-bottom:10px;
    }

    input{
      padding:8px;
      border-radius:8px;
      border:none;
      margin-top:5px;
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
    }

    /* 🔥 NAV */
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>👤 Profile</h2>

<div class="box">
  <img id="photo" src="https://via.placeholder.com/80">
  
  <p><b>Email:</b> <span id="email"></span></p>

  <p>
    <b>Name:</b><br>
    <input id="nameInput">
    <br>
    <button onclick="saveName()">Save Name</button>
  </p>

  <p><b>Wallet:</b> ₹<span id="bal">0</span></p>
  <button onclick="refreshWallet()">🔄 Refresh</button>
</div>

<div class="box">
  <h3>🏆 Earnings</h3>
  <p>Total Wins: ₹<span id="wins">0</span></p>
</div>

<div class="box">
  <h3>🎮 Joined Contests</h3>
  <div id="contests">No contests yet</div>
</div>

<div class="box">
  <h3>🎁 Referral</h3>
  <p>Your Code: <b id="ref"></b></p>
</div>

<!-- 🔥 NAVIGATION -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goProfile()">👤 Profile</div>
  <div onclick="goWallet()">💰 Wallet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);
const db = getFirestore(app);

let userRef;

// 🔥 LOAD DATA
onAuthStateChanged(auth, async (user)=>{
  if(user){

    userRef = doc(db,"users",user.email);

    document.getElementById("email").innerText = user.email;
    document.getElementById("photo").src = user.photoURL || "https://via.placeholder.com/80";

    let snap = await getDoc(userRef);

    if(snap.exists()){
      let data = snap.data();

      document.getElementById("bal").innerText = data.balance || 0;
      document.getElementById("nameInput").value = data.name || user.displayName || "";
      document.getElementById("wins").innerText = data.wins || 0;

      document.getElementById("contests").innerText = (data.contests || []).join(", ") || "No contests";

      document.getElementById("ref").innerText = data.ref || user.email.split("@")[0];

    } else {
      await setDoc(userRef,{
        name:user.displayName || "",
        balance:50, // 🎁 bonus
        wins:0,
        contests:[],
        ref:user.email.split("@")[0]
      });
    }
  }
});

// 🔥 SAVE NAME
window.saveName = async ()=>{
  let name = document.getElementById("nameInput").value;
  await setDoc(userRef,{ name },{ merge:true });
  alert("Name Updated 😈");
};

// 🔥 REFRESH WALLET
window.refreshWallet = async ()=>{
  let snap = await getDoc(userRef);
  document.getElementById("bal").innerText = snap.data().balance || 0;
};
</script>

<script>
// 🔥 NAVIGATION
function goHome(){
  window.location.href = "home.html";
}

function goProfile(){
  window.location.href = "profile.html";
}

function goWallet(){
  window.location.href = "wallet.html";
}
</script>

</body>
</html>
