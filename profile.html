<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0f0f1a;
      color:white;
      text-align:center;
      padding-bottom:80px;
      display:none;
    }

    /* 🔥 GLOW */
    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(255,0,80,0.25), transparent 70%);
      top:-200px;
      left:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(0,150,255,0.25), transparent 70%);
      bottom:-200px;
      right:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    .header{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{
      width:40px;
      border-radius:10px;
    }

    .trusted{
      font-size:12px;
      color:#22c55e;
    }

    h2{
      margin-top:10px;
    }

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
      backdrop-filter:blur(10px);
    }

    /* 🔥 HISTORY */
    .historyBox{
      display:none;
      margin-top:10px;
    }

    .historyItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px 0;
      border-bottom:1px solid rgba(255,255,255,0.1);
      font-size:13px;
    }

    .left{
      text-align:left;
      color:#9ca3af;
    }

    .center{
      font-weight:600;
    }

    .right{
      font-weight:600;
    }

    .deposit{
      color:#22c55e;
    }

    .withdraw{
      color:red;
    }

    button{
      padding:12px;
      border:none;
      border-radius:30px;
      background:#ff2a2a;
      color:white;
      width:90%;
      margin-top:10px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }

    .tg{
      position:fixed;
      bottom:90px;
      right:15px;
      background:#0088cc;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tg img{width:28px;}
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h2>👤 Profile</h2>

<div class="box">
  <p>Email: <span id="email"></span></p>
  <p>Name: <span id="name"></span></p>
  <p>Wallet: ₹<span id="bal">0</span></p>
</div>

<div class="box">
  <h3>🎮 Joined Contests</h3>
  <div id="contests">No contests</div>
</div>

<div class="box" onclick="toggleHistory()">
  <h3>📜 Wallet History ⬇️</h3>
  <div id="history" class="historyBox"></div>
</div>

<div class="box">
  <h3>🎁 Refer & Earn</h3>
  <p id="ref"></p>
  <p id="link"></p>
  <button onclick="copyRef()">Copy Link</button>
</div>

<a href="https://t.me/stackx_admin" target="_blank" class="tg">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIza...",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="index.html";
  }else{

    document.body.style.display="block";

    let userRef = doc(db,"users",user.email);

    email.innerText=user.email;
    name.innerText=user.displayName;

    let snap=await getDoc(userRef);

    if(snap.exists()){
      let data=snap.data();

      bal.innerText=data.balance||0;

      contests.innerText=(data.contests||[]).join(", ")||"No contests";

      let historyDiv=document.getElementById("history");

      if(data.history){
        historyDiv.innerHTML=data.history.map(h=>{
          return `
          <div class="historyItem">
            <div class="left">${h.time || "—"}</div>
            <div class="center">${h.type}</div>
            <div class="right ${h.type}">${h.type==="deposit" ? "+" : "-"}₹${h.amt}</div>
          </div>`;
        }).join("");
      }
    }
  }
});
</script>

<script>
function toggleHistory(){
  let box=document.getElementById("history");
  box.style.display=box.style.display==="block"?"none":"block";
}

function copyRef(){
  navigator.clipboard.writeText(window.location.href);
  alert("Copied 😈");
}

window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";
</script>

</body>
</html>
