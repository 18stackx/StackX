<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      text-align:center;
      padding-bottom:70px;
    }

    .box{
      background:#1f2937;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>👤 Profile</h2>

<div class="box">
  <p><b>Email:</b> <span id="email"></span></p>
  <p><b>Name:</b> <span id="name"></span></p>

  <p><b>Wallet:</b> ₹<span id="bal">0</span></p>
</div>

<div class="box">
  <h3>🏆 Earnings</h3>
  <p>Total Profit: ₹<span id="wins">0</span></p>
</div>

<div class="box">
  <h3>🎮 Joined Contests</h3>
  <div id="contests">No contests yet</div>
</div>

<div class="box">
  <h3>🎁 Referral</h3>
  <p>Your Code: <b id="ref"></b></p>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goProfile()">👤 Profile</div>
  <div onclick="goWallet()">💰 Wallet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);
const db = getFirestore(app);

let userRef;

onAuthStateChanged(auth, async (user)=>{
  if(user){

    userRef = doc(db,"users",user.email);

    // 🔥 EMAIL + NAME (Google se)
    document.getElementById("email").innerText = user.email;
    document.getElementById("name").innerText = user.displayName || "User";

    let snap = await getDoc(userRef);

    if(snap.exists()){
      let data = snap.data();

      let balance = data.balance || 0;
      let deposit = data.deposit || 0;
      let withdraw = data.withdraw || 0;

      // 🔥 WALLET
      document.getElementById("bal").innerText = balance;

      // 🔥 EARNINGS AUTO
      let earnings = balance - deposit + withdraw;
      document.getElementById("wins").innerText = earnings;

      // 🔥 CONTESTS
      document.getElementById("contests").innerText =
        (data.contests || []).join(" , ") || "No contests";

      // 🔥 REFERRAL
      document.getElementById("ref").innerText =
        data.ref || user.email.split("@")[0];

    } else {
      await setDoc(userRef,{
        balance:50, // 🎁 signup bonus
        deposit:0,
        withdraw:0,
        contests:[],
        ref:user.email.split("@")[0]
      });
    }
  }
});
</script>

<script>
function goHome(){
  window.location.href = "home.html";
}

function goProfile(){
  window.location.href = "profile.html";
}

function goWallet(){
  window.location.href = "wallet.html";
}
</script>

</body>
</html>
