<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      text-align:center;
      padding-bottom:80px;
    }

    #loader{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:18px;
    }

    .header{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{width:40px;border-radius:10px;}
    .trusted{font-size:12px;color:#22c55e;}

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
    }

    .historyBox{display:none;margin-top:10px;}

    .historyItem{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,0.1);
      font-size:13px;
    }

    .green{color:#22c55e;}
    .red{color:#ff4d4d;}

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }
  </style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="main" style="display:none;">

<h2>👤 Profile</h2>

<div class="box">
  <p>Email: <span id="email"></span></p>
  <p>Name: <span id="name"></span></p>
  <p>Wallet: ₹<span id="bal">0</span></p>
</div>

<div class="box" onclick="toggleHistory()">
  <h3>📜 Wallet History ⬇️</h3>
  <div id="history" class="historyBox"></div>
</div>

</div>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
  <div onclick="goBets()">📊</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location.href="index.html";
    return;
  }

  document.getElementById("loader").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("email").innerText = user.email;
  document.getElementById("name").innerText = user.displayName || "User";

  const ref = doc(db,"users",user.email);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    document.getElementById("history").innerHTML = "No data";
    return;
  }

  let data = snap.data();

  document.getElementById("bal").innerText = data.balance || 0;

  let historyDiv = document.getElementById("history");

  if(!data.history || data.history.length === 0){
    historyDiv.innerHTML = "No history 😴";
    return;
  }

  // 🔥 REVERSE LATEST FIRST
  let history = [...data.history].reverse();

  let html = "";

  history.forEach(h=>{

    let text = "Bet 🎯";
    let sign = "-";
    let color = "red";

    if(h.type === "deposit"){
      text = "Deposit 💵";
      sign = "+";
      color = "green";
    }
    else if(h.type === "win"){
      text = "Win 🤑";
      sign = "+";
      color = "green";
    }
    else if(h.type === "bet"){
      text = "Bet 🎯";
    }
    else if(h.type === "loss"){
      text = "Loss ❌";
    }

    html += `
    <div class="historyItem">
      <div>${h.time || "--"}</div>
      <div>${text}</div>
      <div class="${color}">${sign}₹${h.amt}</div>
    </div>`;
  });

  historyDiv.innerHTML = html;

});
</script>

<script>
function toggleHistory(){
  let box=document.getElementById("history");
  box.style.display = box.style.display==="block" ? "none" : "block";
}

window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";
window.goBets=()=>location.href="mybets.html"; // 🔥 FIXED
</script>

</body>
</html>
