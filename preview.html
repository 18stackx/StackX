<!DOCTYPE html>
<html>
<head>
  <title>Team Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;text-align:center;}
    .player{
      background:#1f2937;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h2>🔥 My Team</h2>

<div id="team"></div>

<script>
let data = JSON.parse(localStorage.getItem("team"));

if(!data){
  document.body.innerHTML = "<h3>No team saved ❌</h3>";
}else{

  let container = document.getElementById("team");

  data.players.forEach(p=>{
    let div = document.createElement("div");
    div.className = "player";

    let label = "";

    if(p===data.captain) label = " (C ⭐)";
    if(p===data.vice) label = " (VC ⚡)";

    div.innerText = p + label;

    container.appendChild(div);
  });

}
</script>

</body>
</html>
