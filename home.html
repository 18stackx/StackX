<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      padding-bottom:80px;
    }

    .header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{width:42px;border-radius:12px;}
    .trusted{font-size:12px;color:#22c55e;}

    h2{text-align:center;margin-top:10px;}

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
    }

    .match{
      background:rgba(255,255,255,0.05);
      padding:15px;
      margin:10px 0;
      border-radius:15px;
      cursor:pointer;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }

    .supportBox{
      position:fixed;
      bottom:100px;
      left:10px;
      text-align:center;
    }

    .tg{
      background:#0088cc;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tg img{width:28px;}
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h2>🏏 Cricket Fantasy</h2>

<div class="box">
  <h3>💰 Wallet: ₹<span id="balance">--</span></h3>
</div>

<!-- 🔥 MATCHES CONTAINER -->
<div class="box">
  <h3>🔥 Live Matches</h3>
  <div id="matches"></div>
</div>

<!-- SUPPORT -->
<div class="supportBox">
  <a href="https://t.me/stackx_admin" target="_blank" class="tg">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  </a>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 LOAD MATCHES (UPTO 10)
async function loadMatches(){

  let snap = await getDocs(collection(db,"matches"));

  let container = document.getElementById("matches");
  container.innerHTML = "";

  let count = 0;

  snap.forEach(docSnap=>{

    if(count >= 10) return; // 🔥 max 10 match

    let d = docSnap.data();

    if(d.status !== "live") return;

    let div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <b>${d.team1} vs ${d.team2}</b><br><br>
      ${d.team1}: ${d.prob1}%<br>
      ${d.team2}: ${d.prob2}%<br><br>

      <button onclick="openMatch('${docSnap.id}','${d.team1} vs ${d.team2}')">
        Play Now 🔥
      </button>
    `;

    container.appendChild(div);
    count++;
  });

}

// 🔥 WALLET LOAD
onAuthStateChanged(auth, async (user)=>{
  if(user){
    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance || 0;
    }
  }
});

loadMatches();
</script>

<script>
// 🔥 MATCH OPEN
function openMatch(id,name){
  localStorage.setItem("matchId",id);
  localStorage.setItem("matchName",name);
  window.location.href="match.html";
}

// NAV
window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";
</script>

</body>
</html>
