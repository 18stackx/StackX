<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      padding-bottom:70px;
    }

    h2{
      text-align:center;
    }

    .box{
      background:#1f2937;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    .match{
      background:#111827;
      padding:15px;
      margin:10px 0;
      border-radius:8px;
      cursor:pointer;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      cursor:pointer;
      font-size:14px;
    }

    /* 🔥 SUPPORT */
    .supportBox{
      position:fixed;
      bottom:100px;
      left:10px;
      z-index:999;
      text-align:center;
    }

    .supportText{
      font-size:12px;
      margin-bottom:5px;
      color:#9ca3af;
    }

    .tg{
      background:#0088cc;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tg img{
      width:28px;
    }
  </style>
</head>

<body>

<h2>🏏 Cricket Fantasy</h2>

<div class="box">
  <h3>💰 Wallet: ₹<span id="balance">--</span></h3>
</div>

<div class="box">
  <h3>🔥 Live Matches</h3>

  <div id="m1" class="match" onclick="openMatch('m1')">Loading...</div>
  <div id="m2" class="match" onclick="openMatch('m2')">Loading...</div>
  <div id="m3" class="match" onclick="openMatch('m3')">Loading...</div>
</div>

<!-- 🔥 SUPPORT BUTTON -->
<div class="supportBox">
  <div class="supportText">For Support<br>Contact Us</div>

  <a href="https://t.me/stackx_admin" target="_blank" class="tg">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
  </a>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goProfile()">👤 Profile</div>
  <div onclick="goWallet()">💰 Wallet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 LOAD MATCHES
async function loadMatches(){
  let snap = await getDoc(doc(db,"matches","today"));

  if(snap.exists()){
    let data = snap.data();

    document.getElementById("m1").innerText = data.m1 || "No Match";
    document.getElementById("m2").innerText = data.m2 || "No Match";
    document.getElementById("m3").innerText = data.m3 || "No Match";
  }
}

// 🔥 USER BALANCE
onAuthStateChanged(auth, async (user)=>{
  if(user){
    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance || 0;
    }
  } else {
    document.getElementById("balance").innerText = "--";
  }
});

loadMatches();
</script>

<script>
// 🔥 MATCH OPEN
function openMatch(id){
  let name = document.getElementById(id).innerText;

  localStorage.setItem("matchId", id);
  localStorage.setItem("matchName", name);

  window.location.href = "match.html";
}

// 🔥 NAV (GLOBAL FIX)
window.goHome = ()=> location.href="home.html";
window.goProfile = ()=> location.href="profile.html";
window.goWallet = ()=> location.href="wallet.html";
</script>

</body>
</html>
