<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      padding-bottom:80px;
    }

    .header{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{width:40px;border-radius:10px;}
    .trusted{font-size:12px;color:#22c55e;}

    h2{text-align:center;margin-top:10px;}

    #onlineUsers{
      text-align:center;
      font-size:13px;
      color:#22c55e;
      margin-top:5px;
    }

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
    }

    .match{
      background:rgba(255,255,255,0.05);
      padding:15px;
      margin:10px 0;
      border-radius:15px;
    }

    .playBtn{
      margin-top:10px;
      padding:8px 12px;
      border:none;
      border-radius:20px;
      background:#ff2a2a;
      color:white;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h2>🏏 Cricket Fantasy</h2>

<div id="onlineUsers">🔥 Loading...</div>

<div class="box">
  <h3>💰 Wallet: ₹<span id="balance">--</span></h3>
</div>

<!-- 🔥 LIVE MATCHES -->
<div class="box">
  <h3>🔥 Live Matches</h3>
  <div id="matches"></div>
</div>

<!-- 🏁 COMPLETED MATCHES -->
<div class="box">
  <h3>🏁 Completed Matches</h3>
  <div id="completedMatches"></div>
</div>

<!-- RULES -->
<div class="box">
  <h3>📜 Rules</h3>
  <p style="font-size:13px;line-height:1.6;">
    • Bets are final<br>
    • Winnings after result<br>
    • Odds change anytime<br>
    • 18+ only
  </p>
</div>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goBets()">📊</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 LOAD LIVE MATCHES
async function loadMatches(){

  let snap = await getDoc(doc(db,"matches","today"));
  let container = document.getElementById("matches");
  container.innerHTML = "";

  if(snap.exists()){
    let data = snap.data();

    for(let i=1;i<=10;i++){
      let match = data["m"+i];
      if(!match) continue;

      let matchRef = await getDoc(doc(db,"matches",match));
      if(!matchRef.exists()) continue;

      let d = matchRef.data();

      if(d.status === "completed") continue;

      let div = document.createElement("div");
      div.className = "match";

      div.innerHTML = `
        <b>${match}</b><br>
        <button class="playBtn" onclick="openMatch('${match}')">Play</button>
      `;

      container.appendChild(div);
    }
  }
}

// 🏁 COMPLETED MATCHES
async function loadCompleted(){

  let container = document.getElementById("completedMatches");
  container.innerHTML = "";

  let snap = await getDocs(collection(db,"matches"));

  snap.forEach(docSnap=>{

    let d = docSnap.data();

    if(d.status === "completed"){

      let div = document.createElement("div");
      div.className = "match";

      div.innerHTML = `
        <b>${docSnap.id}</b><br>
        Winner: ${d.winner} 🏆
      `;

      container.appendChild(div);
    }
  });

  if(container.innerHTML===""){
    container.innerHTML="No matches yet 😴";
  }
}

// WALLET
onAuthStateChanged(auth, async (user)=>{
  if(user){
    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance || 0;
    }
  }
});

loadMatches();
loadCompleted();
</script>

<script>

function getUsers(){
  return Math.floor(300 + Math.random()*700);
}

setInterval(()=>{
  document.getElementById("onlineUsers").innerText =
    "🔥 " + getUsers() + " users online";
},3000);

function openMatch(name){
  localStorage.setItem("matchName",name);
  window.location.href="match.html";
}

window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";
window.goBets=()=>location.href="mybets.html";

</script>

</body>
</html>
