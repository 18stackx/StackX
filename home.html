<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px;
      background:#111827;
    }

    .logo{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .logo img{
      width:35px;
      border-radius:8px;
    }

    .user{
      font-size:12px;
      color:#9ca3af;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .players button{
      margin:5px;
      padding:8px;
      border:none;
      border-radius:8px;
      background:#374151;
      color:white;
    }

    .players button.selected{
      background:#22c55e;
    }

    .team{
      background:#111827;
      padding:10px;
      border-radius:10px;
    }

    .box{
      background:#111827;
      padding:10px;
      margin:8px 0;
      border-radius:10px;
    }

    .logout{
      background:red;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png">
    <div>
      <div>StackX</div>
      <div class="user" id="userEmail">Loading...</div>
    </div>
  </div>

  <button class="logout" id="logoutBtn">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h3>RCB vs CSK</h3>
    <p style="color:red;">LIVE</p>
  </div>

  <div class="card">
    <h3>Select Team</h3>
    <div id="count">0 / 11</div>
    <div id="players" class="players"></div>
  </div>

  <div class="card">
    <h3>Your Team</h3>
    <div class="team">
      <ul id="team"></ul>
    </div>
  </div>

  <div class="card">
    <h3>Leaderboard</h3>
    <div class="box">🥇 Abhi - 120 pts</div>
    <div class="box">🥈 Rahul - 98 pts</div>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const auth = getAuth(app);

// ✅ LOGIN CHECK (FIXED)
onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("userEmail").innerText = user.email;
  } else {
    window.location.href = "index.html";
  }
});

// ✅ LOGOUT BUTTON
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};
</script>

<script>
let team=[];

const players=["Virat","Rohit","Dhoni","Gill","Hardik","KL Rahul","Sky"];

players.forEach(p=>{
  let btn=document.createElement("button");
  btn.innerText=p;

  btn.onclick=()=>{
    if(team.includes(p)){
      team=team.filter(x=>x!==p);
      btn.classList.remove("selected");
    }else{
      if(team.length<11){
        team.push(p);
        btn.classList.add("selected");
      }
    }
    update();
  };

  document.getElementById("players").appendChild(btn);
});

function update(){
  document.getElementById("count").innerText = team.length + " / 11";

  document.getElementById("team").innerHTML =
    team.map(p=>"<li>"+p+"</li>").join("");
}
</script>

</body>
</html>
