<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      padding:15px;
      text-align:center;
      background:#111827;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
    }

    .match{
      padding:12px;
      margin:8px 0;
      background:#374151;
      border-radius:10px;
      cursor:pointer;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:#111827;
    }

    .nav button{
      flex:1;
      padding:12px;
      border:none;
      background:none;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>🏏 StackX</h2>
</div>

<div class="container">

  <div class="card">
    <h3>Live Matches</h3>

    <div class="match" onclick="openMatch('match1')" id="match1">Loading...</div>
    <div class="match" onclick="openMatch('match2')" id="match2"></div>
    <div class="match" onclick="openMatch('match3')" id="match3"></div>

  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goWallet()">💰 Wallet</button>
<hr>

<h3>💰 Wallet: ₹<span id="balance">0</span></h3>

<button onclick="showTeam()">👑 My Team</button>

<div id="teamBox" style="margin-top:15px;"></div>
</div>

<script>
// 🔥 MATCH CLICK (UPGRADED)
function openMatch(id){

  let matchName = document.getElementById(id).innerText;

  localStorage.setItem("matchId", id);
  localStorage.setItem("matchName", matchName);

  window.location.href = "match.html";
}

// NAV
function goHome(){ window.location.href="home.html"; }
function goProfile(){ window.location.href="profile.html"; }
function goWallet(){ window.location.href="wallet.html"; }
</script>

<!-- FIREBASE REALTIME -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 REALTIME MATCH UPDATE
onSnapshot(doc(db,"matches","today"),(snap)=>{
  if(snap.exists()){
    let data = snap.data();

    document.getElementById("match1").innerText = data.m1 || "";
    document.getElementById("match2").innerText = data.m2 || "";
    document.getElementById("match3").innerText = data.m3 || "";
  }
});
</script>

</body>
</html>
