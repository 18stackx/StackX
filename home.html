<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
    }

    /* HEADER */
    .header{
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:url('logo.png') no-repeat center;
  background-size:200px;

  opacity:0.08;
  filter: blur(2px);
  z-index:-1;
}
    }

    .login{
      background:#22c55e;
      padding:8px 15px;
      border-radius:8px;
    }

    /* MATCH SECTION */
    .section{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
    }

    .match{
      padding:12px;
      background:#374151;
      border-radius:10px;
      margin-top:10px;
      cursor:pointer;
      font-weight:bold;
    }

    /* WALLET */
    .wallet{
      background:#1f2937;
      margin:15px;
      padding:15px;
      border-radius:12px;
      text-align:center;
    }

    /* TEAM */
    .team{
      margin:15px;
    }

    /* NAV */
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      text-align:center;
      font-size:14px;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🏏 StackX</div>
  <div class="login">Login</div>
</div>

<!-- LIVE MATCHES -->
<div class="section">
  <h3>🔥 Live Cricket Matches</h3>

  <div class="card" id="matchesBox">

    <div class="match" onclick="openMatch(this)">RCB vs CSK</div>
    <div class="match" onclick="openMatch(this)">MI vs KKR</div>
    <div class="match" onclick="openMatch(this)">SRH vs DC</div>

  </div>
</div>

<!-- WALLET -->
<div class="wallet">
  💰 Wallet: ₹<span id="balance">0</span>
</div>

<!-- MY TEAM -->
<div class="team">
  <button onclick="showTeam()">👑 My Team</button>
  <div id="teamBox"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div>🏠 Home</div>
  <div>👤 Profile</div>
  <div>💰 Wallet</div>
</div>

<script>
// 🔥 OPEN MATCH
function openMatch(el){
  let match = el.innerText;

  localStorage.setItem("matchName", match);
  window.location.href = "match.html";
}

// 🔥 SHOW TEAM
function showTeam(){
  let data = JSON.parse(localStorage.getItem("team"));
  let box = document.getElementById("teamBox");

  if(!data){
    box.innerHTML = "<p>No team selected ❌</p>";
    return;
  }

  box.innerHTML = "<h3>🔥 My Team</h3>";

  data.players.forEach(p=>{
    let tag = "";

    if(p === data.captain) tag = " (C ⭐)";
    if(p === data.vice) tag = " (VC ⚡)";

    box.innerHTML += `
      <div style="background:#1f2937;padding:10px;margin:6px;border-radius:8px;">
        ${p}${tag}
      </div>
    `;
  });
}
</script>

</body>
</html>
