<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      padding:15px;
      background:#111827;
      text-align:center;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:#111827;
    }

    .nav button{
      flex:1;
      padding:12px;
      border:none;
      background:none;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>🚀 StackX</h2>
</div>

<div class="container">

  <!-- 🔥 MATCHES -->
  <div class="card">
    <h3 id="match1">Loading...</h3>
    <h3 id="match2"></h3>
    <h3 id="match3"></h3>
    <h3 id="match4"></h3>
    <h3 id="match5"></h3>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="goProfile()">👤 Profile</button>
  <button onclick="goWallet()">💰 Wallet</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 FETCH MATCHES
async function loadMatches(){
  const ref = doc(db,"matches","today");
  const snap = await getDoc(ref);

  if(snap.exists()){
    const data = snap.data();

    document.getElementById("match1").innerText = data.m1 || "";
    document.getElementById("match2").innerText = data.m2 || "";
    document.getElementById("match3").innerText = data.m3 || "";
    document.getElementById("match4").innerText = data.m4 || "";
    document.getElementById("match5").innerText = data.m5 || "";
  }
}

loadMatches();

// NAV
window.goHome = () => window.location.href="home.html";
window.goProfile = () => window.location.href="profile.html";
window.goWallet = () => window.location.href="wallet.html";
</script>

</body>
</html>
