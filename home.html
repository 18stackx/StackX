<!DOCTYPE html>
<html>
<head>
  <title>StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f1a;
      color:white;
    }

    /* 🔥 BACKGROUND LOGO */
    body::before{
      content:"";
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:url('logo.png') no-repeat center;
      background-size:180px;
      opacity:0.05;
      filter: blur(1px);
      z-index:-1;
      pointer-events:none;
    }

    /* HEADER */
    .header{
      background:#111827;
      padding:15px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .logo{
      font-size:20px;
      font-weight:bold;
    }

    /* MATCH SECTION */
    .section{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
    }

    .match{
      padding:12px;
      background:#374151;
      border-radius:10px;
      margin-top:10px;
      cursor:pointer;
      font-weight:bold;
    }

    /* WALLET */
    .wallet{
      background:#1f2937;
      margin:15px;
      padding:15px;
      border-radius:12px;
      text-align:center;
    }

    /* TEAM */
    .team{
      margin:15px;
    }

    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-weight:bold;
    }

    /* NAV */
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#111827;
      display:flex;
      justify-content:space-around;
      padding:10px;
    }

    .nav div{
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🏏 StackX</div>
</div>

<!-- MATCHES -->
<div class="section">
  <h3>🔥 Live Cricket Matches</h3>

  <div class="card">
    <div class="match" onclick="openMatch(this)">RCB vs CSK</div>
    <div class="match" onclick="openMatch(this)">MI vs KKR</div>
    <div class="match" onclick="openMatch(this)">SRH vs DC</div>
  </div>
</div>

<!-- WALLET -->
<div class="wallet">
  💰 Wallet: ₹<span id="balance">0</span>
</div>

<!-- MY TEAM -->
<div class="team">
  <button onclick="showTeam()">👑 My Team</button>
  <div id="teamBox"></div>
</div>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠 Home</div>
  <div onclick="goProfile()">👤 Profile</div>
  <div onclick="goWallet()">💰 Wallet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 WALLET LOAD
auth.onAuthStateChanged(async (user)=>{
  if(user){
    const ref = doc(db,"users",user.email);
    const snap = await getDoc(ref);

    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance || 0;
    }
  }
});
</script>

<script>
// 🔥 OPEN MATCH
function openMatch(el){
  let match = el.innerText;
  localStorage.setItem("matchName", match);
  window.location.href = "match.html";
}

// 🔥 SHOW TEAM
function showTeam(){
  let data = JSON.parse(localStorage.getItem("team"));
  let box = document.getElementById("teamBox");

  if(!data){
    box.innerHTML = "<p>No team selected ❌</p>";
    return;
  }

  box.innerHTML = "<h3>🔥 My Team</h3>";

  data.players.forEach(p=>{
    let tag = "";
    if(p===data.captain) tag=" (C ⭐)";
    if(p===data.vice) tag=" (VC ⚡)";

    box.innerHTML += `<div style="background:#1f2937;padding:10px;margin:6px;border-radius:8px;">${p}${tag}</div>`;
  });
}

// 🔥 NAVIGATION
function goHome(){
  window.location.href = "home.html";
}

function goProfile(){
  window.location.href = "profile.html";
}

function goWallet(){
  window.location.href = "wallet.html";
}
</script>

</body>
</html>
