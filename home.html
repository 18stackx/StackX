<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      padding-bottom:80px;
    }

    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(255,0,80,0.25), transparent 70%);
      top:-200px;
      left:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(0,150,255,0.25), transparent 70%);
      bottom:-200px;
      right:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    .header{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-top:15px;
    }

    .header img{width:40px;border-radius:10px;}
    .trusted{font-size:12px;color:#22c55e;}

    h2{text-align:center;margin-top:10px;}

    /* 🔥 LIVE USERS */
    #onlineUsers{
      text-align:center;
      font-size:13px;
      color:#22c55e;
      margin-top:5px;
    }

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
      backdrop-filter:blur(10px);
    }

    .match{
      background:rgba(255,255,255,0.05);
      padding:15px;
      margin:10px 0;
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
    }

    .match:hover{
      background:rgba(255,255,255,0.08);
      transform:translateY(-5px);
    }

    .playBtn{
      margin-top:10px;
      padding:8px 12px;
      border:none;
      border-radius:20px;
      background:#ff2a2a;
      color:white;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }

    .tg{
      position:fixed;
      bottom:90px;
      right:15px;
      background:#0088cc;
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .tg img{width:28px;}
  </style>
</head>

<body>

<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h2>🏏 Cricket Fantasy</h2>

<!-- 🔥 LIVE USERS -->
<div id="onlineUsers">🔥 Loading users...</div>

<div class="box">
  <h3>💰 Wallet: ₹<span id="balance">--</span></h3>
</div>

<div class="box">
  <h3>🔥 Live Matches</h3>
  <div id="matches"></div>
</div>

<a href="https://t.me/stackx_admin" target="_blank" class="tg">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 MATCH LOAD
async function loadMatches(){
  let snap = await getDoc(doc(db,"matches","today"));
  let container = document.getElementById("matches");
  container.innerHTML = "";

  if(snap.exists()){
    let data = snap.data();

    for(let i=1;i<=10;i++){
      let match = data["m"+i];
      if(!match) continue;

      let div = document.createElement("div");
      div.className = "match";

      div.innerHTML = `
        <b>${match}</b><br>
        <button class="playBtn" onclick="openMatch('${match}')">Play Now 🔥</button>
      `;

      container.appendChild(div);
    }
  }
}

// 🔥 WALLET
onAuthStateChanged(auth, async (user)=>{
  if(user){
    let snap = await getDoc(doc(db,"users",user.email));
    if(snap.exists()){
      document.getElementById("balance").innerText = snap.data().balance || 0;
    }
  }
});

loadMatches();
</script>

<script>

// 🔥 SMART LIVE USERS SYSTEM
function getUsers(){

  let hour = new Date().getHours();
  let users = 0;

  if(hour >= 6 && hour < 12){
    users = 300 + Math.random()*200;
  }
  else if(hour >= 12 && hour < 18){
    users = 500 + Math.random()*100;
  }
  else if(hour >= 18 && hour < 22){
    users = 800 + Math.random()*1200;
  }
  else{
    if(hour >= 22){
      users = 1000 + Math.random()*500;
    }
    else if(hour >= 0 && hour < 3){
      users = 300 + Math.random()*200;
    }
    else{
      users = 50 + Math.random()*100;
    }
  }

  return Math.floor(users);
}

// 🔁 UPDATE EVERY 3 SEC
setInterval(()=>{
  document.getElementById("onlineUsers").innerText =
    "🔥 " + getUsers() + " users online";
},3000);

// FIRST LOAD
document.getElementById("onlineUsers").innerText =
  "🔥 " + getUsers() + " users online";


// NAV
function openMatch(name){
  localStorage.setItem("matchName",name);
  window.location.href="match.html";
}

window.goHome=()=>location.href="home.html";
window.goProfile=()=>location.href="profile.html";
window.goWallet=()=>location.href="wallet.html";

</script>

</body>
</html>
