<!DOCTYPE html>
<html>
<head>
  <title>Match</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:#0f0f1a;
      color:white;
      padding-bottom:80px;
      text-align:center;
    }

    .box{
      background:rgba(255,255,255,0.05);
      margin:15px;
      padding:20px;
      border-radius:20px;
    }

    button{
      width:90%;
      padding:12px;
      margin:10px;
      border:none;
      border-radius:30px;
      background:#ff2a2a;
      color:white;
      font-weight:600;
    }

    input{
      width:85%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-top:10px;
    }

    .teamBtn{
      background:#111827;
      margin:10px;
      padding:15px;
      border-radius:12px;
      cursor:pointer;
    }

    .selected{
      background:#22c55e;
    }

    .odds{
      font-size:12px;
      color:#9ca3af;
      margin-top:5px;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:space-around;
      padding:12px;
    }
  </style>
</head>

<body>

<h2 id="matchTitle"></h2>

<div class="box">
  <h3>Select Winner</h3>

  <div id="team1" class="teamBtn"></div>
  <div id="team2" class="teamBtn"></div>
</div>

<div class="box">
  <h3>💰 Bet Amount</h3>

  <input id="amt" placeholder="Enter Amount">

  <p id="minBet"></p>
  <p id="return"></p>

  <button onclick="placeBet()">Place Bet</button>
</div>

<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 LOAD MATCH
let match = localStorage.getItem("matchName");

if(!match){
  alert("Match not found ❌");
  location.href="home.html";
}

document.getElementById("matchTitle").innerText = match;

let [t1,t2] = match.split(" vs ");

team1.innerHTML = t1 + `<div id="odds1" class="odds"></div>`;
team2.innerHTML = t2 + `<div id="odds2" class="odds"></div>`;

let selected = null;

team1.onclick = ()=>{
  selected = t1;
  team1.classList.add("selected");
  team2.classList.remove("selected");
};

team2.onclick = ()=>{
  selected = t2;
  team2.classList.add("selected");
  team1.classList.remove("selected");
};

// 🔥 LOAD ADMIN DATA
let min = 10;
let odds1 = 2;
let odds2 = 2;
let pool1 = 0;
let pool2 = 0;

let refMatch = doc(db,"matches",match);
let snap = await getDoc(refMatch);

if(snap.exists()){
  let d = snap.data();

  min = d.minBet || 10;
  odds1 = d.rcbOdds || 2;
  odds2 = d.cskOdds || 2;

  pool1 = d.rcbPool || 0;
  pool2 = d.cskPool || 0;
}

// UI
document.getElementById("minBet").innerText = "Min Bet: ₹"+min;
document.getElementById("odds1").innerText = "Odds: "+odds1+"x";
document.getElementById("odds2").innerText = "Odds: "+odds2+"x";

// 🔥 PLACE BET + LIVE ODDS UPDATE
window.placeBet = async function(){

  let amt = parseInt(document.getElementById("amt").value);

  if(!selected){
    alert("Select team ❌");
    return;
  }

  if(!amt || amt < min){
    alert("Minimum ₹"+min);
    return;
  }

  const user = auth.currentUser;

  if(!user){
    alert("Login required ❌");
    location.href="index.html";
    return;
  }

  let multiplier = selected === t1 ? odds1 : odds2;

  // 🔥 UPDATE POOL
  if(selected === t1){
    pool1 += amt;
  } else {
    pool2 += amt;
  }

  // 🔥 AUTO ODDS CHANGE (DEMAND BASED 😈)
  let total = pool1 + pool2;

  if(total > 0){
    odds1 = (total / (pool1 || 1)).toFixed(2);
    odds2 = (total / (pool2 || 1)).toFixed(2);
  }

  // 🔥 SAVE MATCH UPDATE
  await updateDoc(refMatch,{
    rcbPool:pool1,
    cskPool:pool2,
    rcbOdds:parseFloat(odds1),
    cskOdds:parseFloat(odds2)
  });

  // 🔥 SAVE BET
  let ref = doc(db,"bets",user.email+"_"+Date.now());

  await setDoc(ref,{
    match,
    team:selected,
    amount:amt,
    multiplier:parseFloat(multiplier),
    user:user.email,
    status:"pending",
    time:new Date().toLocaleString()
  });

  alert("Bet Placed 😈🔥");

  location.reload(); // refresh for new odds
};

// NAV
window.goHome = ()=> location.href="home.html";
window.goProfile = ()=> location.href="profile.html";
window.goWallet = ()=> location.href="wallet.html";

</script>

</body>
</html>
