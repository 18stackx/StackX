<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔥 LOAD MATCH
let match = localStorage.getItem("matchName");
document.getElementById("matchTitle").innerText = match;

let [t1,t2] = match.split(" vs ");

team1.innerText = t1;
team2.innerText = t2;

let selected = null;

team1.onclick = ()=>{
  selected = t1;
  team1.classList.add("selected");
  team2.classList.remove("selected");
};

team2.onclick = ()=>{
  selected = t2;
  team2.classList.add("selected");
  team1.classList.remove("selected");
};

// 🔥 ADMIN DATA LOAD
let min = 0;
let multiplier = 1;

let snap = await getDoc(doc(db,"matches",match));

if(snap.exists()){
  let data = snap.data();

  min = data.minBet || 10;
  multiplier = data.multiplier || 1.5;

  document.getElementById("minBet").innerText = "Min Bet: ₹"+min;
  document.getElementById("return").innerText = "Return: "+multiplier+"x";
}

// 🔥 PLACE BET (UPDATED ✅)
window.placeBet = async function(){

  let amt = parseInt(document.getElementById("amt").value);

  if(!selected){
    alert("Select team ❌");
    return;
  }

  if(!amt || amt < min){
    alert("Minimum ₹"+min);
    return;
  }

  const user = auth.currentUser;

  if(!user){
    alert("Login required ❌");
    return;
  }

  let ref = doc(db,"bets",user.email+"_"+Date.now());

  await setDoc(ref,{
    match,
    team:selected,
    amount:amt,
    multiplier,
    user:user.email, // 🔥 THIS WAS MISSING
    time:new Date().toLocaleString() // 🔥 TIME ADDED
  });

  alert("Bet Placed 😈🔥");
};

// NAV
window.goHome = ()=> location.href="home.html";
window.goProfile = ()=> location.href="profile.html";
window.goWallet = ()=> location.href="wallet.html";

</script>
