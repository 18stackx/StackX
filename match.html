<!DOCTYPE html>
<html>
<head>
  <title>Match</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      margin:0;
    }

    .header{
      padding:15px;
      text-align:center;
      background:#111827;
    }

    .player{
      background:#1f2937;
      padding:12px;
      margin:8px;
      border-radius:10px;
      cursor:pointer;
    }

    .selected{
      background:green !important;
    }

    button{
      width:90%;
      margin:15px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="header">
  <h3 id="matchTitle">Players</h3>
</div>

<div id="players"></div>

<button onclick="saveTeam()">Save Team</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase Config
const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 MATCH NAME
let match = localStorage.getItem("matchName");
document.getElementById("matchTitle").innerText = match || "Players";

// 🔥 CHECK
if(!match){
  document.getElementById("players").innerHTML = "<p style='text-align:center;'>No match selected ❌</p>";
  throw new Error("No match");
}

// 🔥 TEAM SPLIT
let teams = match.split(" vs ");
let t1 = teams[0].trim();
let t2 = teams[1].trim();

// 🔥 FETCH TEAMS
let snap1 = await getDoc(doc(db,"teams",t1));
let snap2 = await getDoc(doc(db,"teams",t2));

if(!snap1.exists() || !snap2.exists()){
  document.getElementById("players").innerHTML = "<p style='text-align:center;'>Teams not found ❌</p>";
  throw new Error("Team missing");
}

let players1 = snap1.data().players || [];
let players2 = snap2.data().players || [];

let allPlayers = [...players1, ...players2];

// 🔥 UI + SELECT SYSTEM
let container = document.getElementById("players");
let selected = [];

allPlayers.forEach(p=>{
  let div = document.createElement("div");
  div.className = "player";
  div.innerText = p;

  div.onclick = ()=>{
    if(selected.includes(p)){
      selected = selected.filter(x=>x!==p);
      div.classList.remove("selected");
    } else {
      if(selected.length >= 11){
        alert("Max 11 players allowed ❌");
        return;
      }
      selected.push(p);
      div.classList.add("selected");
    }
  };

  container.appendChild(div);
});

// 🔥 SAVE TEAM
window.saveTeam = ()=>{
  localStorage.setItem("myTeam", JSON.stringify(selected));
  alert("Team Saved 😈🔥");
};
</script>

</body>
</html>
