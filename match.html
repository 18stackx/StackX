<!DOCTYPE html>
<html>
<head>
  <title>Match</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}
    .header{padding:15px;text-align:center;background:#111827;}

    .player{
      background:#1f2937;
      padding:12px;
      margin:8px;
      border-radius:10px;
      cursor:pointer;
    }

    .selected{background:green;}
    .captain{border:2px solid gold;}
    .vice{border:2px solid cyan;}

    button{
      width:90%;
      margin:10px;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
    }
  </style>
</head>

<body>

<div class="header">
  <h3 id="matchTitle"></h3>
</div>

<div id="players"></div>

<button onclick="saveTeam()">Save Team</button>
<button onclick="goPreview()">Preview Team</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

let match = localStorage.getItem("matchName");
document.getElementById("matchTitle").innerText = match;

let [t1,t2] = match.split(" vs ");

let snap1 = await getDoc(doc(db,"teams",t1.trim()));
let snap2 = await getDoc(doc(db,"teams",t2.trim()));

let allPlayers = [...snap1.data().players, ...snap2.data().players];

let container = document.getElementById("players");

let selected = [];
let captain = null;
let vice = null;

allPlayers.forEach(p=>{
  let div = document.createElement("div");
  div.className = "player";
  div.innerText = p;

  div.onclick = ()=>{
    if(!selected.includes(p)){
      if(selected.length>=11){
        alert("Max 11 players ❌");
        return;
      }
      selected.push(p);
      div.classList.add("selected");
    }else{

      // 👉 CAPTAIN
      if(!captain){
        captain = p;
        div.classList.add("captain");
        alert("Captain selected ⭐");
        return;
      }

      // 👉 VICE CAPTAIN
      if(!vice && p!==captain){
        vice = p;
        div.classList.add("vice");
        alert("Vice Captain selected ⚡");
        return;
      }

      // 👉 REMOVE
      selected = selected.filter(x=>x!==p);
      div.classList.remove("selected","captain","vice");

      if(p===captain) captain=null;
      if(p===vice) vice=null;
    }
  };

  container.appendChild(div);
});

// SAVE
window.saveTeam = ()=>{
  localStorage.setItem("team", JSON.stringify({
    players:selected,
    captain,
    vice
  }));
  alert("Team Saved 😈🔥");
};

// PREVIEW PAGE
window.goPreview = ()=>{
  window.location.href = "preview.html";
};
</script>

</body>
</html>
