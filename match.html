<!DOCTYPE html>  
<html>  
<head>  
  <title>Match</title>  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">  

  <style>  
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}  

    body{  
      background:#0f0f1a;  
      color:white;  
      padding-bottom:80px;  
      text-align:center;  
    }  

    .box{  
      background:rgba(255,255,255,0.05);  
      margin:15px;  
      padding:20px;  
      border-radius:20px;  
    }  

    button{  
      width:90%;  
      padding:12px;  
      margin:10px;  
      border:none;  
      border-radius:30px;  
      background:#ff2a2a;  
      color:white;  
      font-weight:600;  
    }  

    input{  
      width:85%;  
      padding:12px;  
      border-radius:10px;  
      border:none;  
      margin-top:10px;  
    }  

    .teamBtn{  
      background:#111827;  
      margin:10px;  
      padding:15px;  
      border-radius:12px;  
      cursor:pointer;  
    }  

    .selected{  
      background:#22c55e;  
    }  

    .odds{  
      font-size:12px;  
      color:#9ca3af;  
      margin-top:5px;  
    }  

    .nav{  
      position:fixed;  
      bottom:0;  
      width:100%;  
      background:rgba(0,0,0,0.7);  
      display:flex;  
      justify-content:space-around;  
      padding:12px;  
    }  

    .optionBtn{  
      background:#111827;  
      margin:10px;  
      padding:12px;  
      border-radius:10px;  
      cursor:pointer;  
    }  
  </style>  
</head>  

<body>  

<h2 id="matchTitle"></h2>  

<div class="box">  
  <h3>Select Winner</h3>  
  <div id="team1" class="teamBtn"></div>  
  <div id="team2" class="teamBtn"></div>  
</div>  

<div class="box">  
  <h3>💰 Bet Amount</h3>  
  <input id="amt" placeholder="Enter Amount">  
  <p id="minBet"></p>  
  <button id="betBtn" onclick="placeBet()">Place Bet</button>  
</div>  

<div class="box">  
  <h3>Predict Bet and Win 💰</h3>  
  <div id="predictions"></div>  
</div>  

<button onclick="openHistory()">📊 My Prediction History</button>

<div class="nav">  
  <div onclick="goHome()">🏠</div>  
  <div onclick="goProfile()">👤</div>  
  <div onclick="goWallet()">💰</div>  
</div>  

<script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";  
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";  
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";  

const app = initializeApp({  
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",  
  authDomain:"stackx-9f92e.firebaseapp.com",  
  projectId:"stackx-9f92e"  
});  

const db = getFirestore(app);  
const auth = getAuth(app);  

let currentUser = null;

onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user;
  } else {
    alert("Login required ❌");
    location.href="index.html";
  }
});

let match = localStorage.getItem("matchName");  

if(!match){  
  alert("Match not found ❌");  
  location.href="home.html";  
}  

document.getElementById("matchTitle").innerText = match;  

let [t1,t2] = match.split(" vs ");  

team1.innerHTML = `${t1}<div id="odds1" class="odds"></div>`;  
team2.innerHTML = `${t2}<div id="odds2" class="odds"></div>`;  

let selected = null;  

team1.onclick = ()=>{  
  selected = t1.trim().toLowerCase();  
  team1.classList.add("selected");  
  team2.classList.remove("selected");  
};  

team2.onclick = ()=>{  
  selected = t2.trim().toLowerCase();  
  team2.classList.add("selected");  
  team1.classList.remove("selected");  
};  

let refMatch = doc(db,"matches",match);  

let min = 10;  
let odds1 = 2;  
let odds2 = 2;  
let betLocked = false;  

const odds1El = document.getElementById("odds1");  
const odds2El = document.getElementById("odds2");  

onSnapshot(refMatch,(snap)=>{  
  if(snap.exists()){  
    let d = snap.data();  

    min = d.minBet || 10;  
    odds1 = d.team1Odds || 2;  
    odds2 = d.team2Odds || 2;  

    betLocked = false;  
    betBtn.disabled = false;  
    betBtn.innerText = "Place Bet";  

    if(d.lockTime){  
      let now = new Date();  
      let lock = new Date(d.lockTime);  

      if(now >= lock){  
        betLocked = true;  
        betBtn.innerText = "Bet Locked 🔒";  
        betBtn.disabled = true;  
      }  
    }  

    minBet.innerText = "Min Bet: ₹"+min;  
    odds1El.innerText = "Odds: "+odds1+"x";  
    odds2El.innerText = "Odds: "+odds2+"x";  
  }  
});  

// 🔥 PREDICTIONS LOCK FIX
const predRef = collection(db,"predictions");

onSnapshot(predRef,(snapshot)=>{
  let container = document.getElementById("predictions");
  container.innerHTML = "";

  snapshot.forEach(docSnap=>{
    let d = docSnap.data();

    if(
      d.match?.trim().toLowerCase() === match.trim().toLowerCase() &&
      d.status === "live"
    ){

      let now = new Date();
      let locked = false;

      if(d.lockTime){
        let lock = new Date(d.lockTime);
        if(now >= lock){
          locked = true;
        }
      }

      let div = document.createElement("div");
      let html = `<b>${d.question}</b><br>`;

      if(locked){
        html += `<div style="color:gray;">Prediction Locked 🔒</div>`;
      }else{
        d.options.forEach(opt=>{
          html += `
            <div class="optionBtn"
            onclick="placePrediction('${docSnap.id}','${opt.name}',${opt.return})">
              ${opt.name} (${opt.return}x)
            </div>
          `;
        });
      }

      div.innerHTML = html;
      container.appendChild(div);
    }
  });
});

// 🔥 DOUBLE SAFETY LOCK
window.placePrediction = async (id,option,ret)=>{

  let predRef = doc(db,"predictions",id);
  let snapPred = await getDoc(predRef);
  let pData = snapPred.data();

  if(pData.lockTime){
    let now = new Date();
    let lock = new Date(pData.lockTime);
    if(now >= lock){
      alert("Prediction Locked 🔒");
      return;
    }
  }

  let amt = parseInt(prompt("Enter amount"));
  if(!amt) return;

  const user = currentUser;
  if(!user) return;

  let userRef = doc(db,"users",user.email);
  let snap = await getDoc(userRef);

  let data = snap.data();

  if((data.balance||0) < amt){
    alert("Low balance ❌");
    return;
  }

  await updateDoc(userRef,{
    balance:(data.balance||0)-amt,
    history:[
      ...(data.history || []),
      {
        type:"prediction",
        amt:amt,
        match:match,
        option:option,
        time:new Date().toLocaleString()
      }
    ]
  });

  await setDoc(doc(db,"predBets",user.email+"_"+Date.now()),{
    predictionId:id,
    option,
    amount:amt,
    return:ret,
    user:user.email,
    status:"pending",
    time:new Date().toLocaleString()
  });

  alert("Prediction placed 🔥");
};

window.openHistory = ()=>{
  location.href = "prediction-history.html";
};

// BET
let loading = false;

window.placeBet = async function(){
  if(betLocked){
    alert("Match started ❌ Betting closed");
    return;
  }

  if(loading) return;
  loading = true;

  betBtn.innerText = "Processing...";

  try{
    let amt = parseInt(document.getElementById("amt").value);

    if(!selected){
      alert("Select team ❌");
      throw "stop";
    }

    if(!amt || amt < min){
      alert("Minimum ₹"+min);
      throw "stop";
    }

    const user = currentUser;

    const userRef = doc(db,"users",user.email);
    const userSnap = await getDoc(userRef);

    let userData = userSnap.data();
    let balance = userData.balance || 0;

    if(balance < amt){
      alert("Insufficient Balance ❌");
      throw "stop";
    }

    await updateDoc(userRef,{
      balance: balance - amt,
      history:[
        ...(userData.history || []),
        {
          type:"bet",
          amt:amt,
          match:match,
          team:selected,
          time:new Date().toLocaleString()
        }
      ]
    });

    let multiplier = selected === t1.trim().toLowerCase() ? odds1 : odds2;

    await setDoc(doc(db,"bets",user.email+"_"+Date.now()),{
      match,
      team:selected,
      amount:amt,
      return:parseFloat(multiplier),
      user:user.email,
      status:"pending",
      time:new Date().toLocaleString()
    });

    alert("Bet Placed 😈🔥");

  }catch(e){
    if(e !== "stop"){
      console.error(e);
      alert("Error ❌");
    }
  }

  loading = false;
  betBtn.innerText = "Place Bet";
};

window.goHome = ()=> location.href="home.html";
window.goProfile = ()=> location.href="profile.html";
window.goWallet = ()=> location.href="wallet.html";

</script>  

</body>  
</html>
