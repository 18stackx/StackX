<!DOCTYPE html>
<html>
<head>
  <title>Match</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0f0f1a;
      color:white;
      overflow-x:hidden;
      padding-bottom:80px;
    }

    /* 🔥 GLOW BG */
    body::before{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(255,0,80,0.25), transparent 70%);
      top:-200px;
      left:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    body::after{
      content:'';
      position:fixed;
      width:600px;
      height:600px;
      background:radial-gradient(circle, rgba(0,150,255,0.25), transparent 70%);
      bottom:-200px;
      right:-200px;
      filter:blur(120px);
      z-index:-1;
    }

    /* 🔥 HEADER */
    .header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-top:15px;
      text-align:center;
    }

    .header img{
      width:40px;
      border-radius:10px;
    }

    .trusted{
      font-size:12px;
      color:#22c55e;
    }

    .matchTitle{
      margin-top:10px;
      text-align:center;
      font-weight:600;
    }

    /* 🔥 PLAYER GRID */
    .players{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:12px;
      padding:15px;
    }

    /* 🔥 PLAYER CARD */
    .player{
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:15px;
      text-align:center;
      cursor:pointer;
      transition:0.3s;
      border:1px solid transparent;
    }

    .player:hover{
      transform:translateY(-5px);
      background:rgba(255,255,255,0.08);
    }

    /* 🔥 SELECTED */
    .selected{
      border:2px solid #22c55e;
      box-shadow:0 0 10px #22c55e;
    }

    /* 🔥 CAPTAIN */
    .captain{
      border:2px solid gold;
      box-shadow:0 0 10px gold;
    }

    /* 🔥 VICE */
    .vice{
      border:2px solid #00c3ff;
      box-shadow:0 0 10px #00c3ff;
    }

    /* 🔥 BUTTON */
    button{
      width:90%;
      margin:10px auto;
      display:block;
      padding:12px;
      border:none;
      border-radius:30px;
      background:#ff2a2a;
      color:white;
      font-weight:600;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    /* 🔥 NAV */
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:space-around;
      padding:12px;
      z-index:999;
    }

    .nav div{
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <img src="logo.png">
  <div>
    <div><b>StackX Fantasy</b></div>
    <div class="trusted">✔ Trusted Site</div>
  </div>
</div>

<h3 id="matchTitle" class="matchTitle"></h3>

<div id="players" class="players"></div>

<button onclick="saveTeam()">Save Team</button>
<button onclick="goPreview()">Preview Team</button>

<!-- NAV -->
<div class="nav">
  <div onclick="goHome()">🏠</div>
  <div onclick="goProfile()">👤</div>
  <div onclick="goWallet()">💰</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

let match = localStorage.getItem("matchName");
document.getElementById("matchTitle").innerText = match;

let [t1,t2] = match.split(" vs ");

let snap1 = await getDoc(doc(db,"teams",t1.trim()));
let snap2 = await getDoc(doc(db,"teams",t2.trim()));

let allPlayers = [...snap1.data().players, ...snap2.data().players];

let container = document.getElementById("players");

let selected = [];
let captain = null;
let vice = null;

allPlayers.forEach(p=>{
  let div = document.createElement("div");
  div.className = "player";
  div.innerText = p;

  div.onclick = ()=>{

    if(!selected.includes(p)){
      if(selected.length>=11){
        alert("Max 11 players ❌");
        return;
      }
      selected.push(p);
      div.classList.add("selected");
    }else{

      if(!captain){
        captain = p;
        div.classList.add("captain");
        alert("Captain selected ⭐");
        return;
      }

      if(!vice && p!==captain){
        vice = p;
        div.classList.add("vice");
        alert("Vice Captain selected ⚡");
        return;
      }

      selected = selected.filter(x=>x!==p);
      div.classList.remove("selected","captain","vice");

      if(p===captain) captain=null;
      if(p===vice) vice=null;
    }
  };

  container.appendChild(div);
});

// SAVE
window.saveTeam = ()=>{
  localStorage.setItem("team", JSON.stringify({
    players:selected,
    captain,
    vice
  }));
  alert("Team Saved 😈🔥");
};

// PREVIEW
window.goPreview = ()=>{
  window.location.href="preview.html";
};

// NAV
window.goHome = ()=> location.href="home.html";
window.goProfile = ()=> location.href="profile.html";
window.goWallet = ()=> location.href="wallet.html";

</script>

</body>
</html>
