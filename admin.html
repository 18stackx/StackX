<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      margin:0;
    }

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:12px;
      max-width:400px;
      margin:auto;
      margin-top:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      font-weight:bold;
    }

    .stat{
      display:flex;
      justify-content:space-between;
      margin:8px 0;
    }

    .liveMatch{
      background:#111;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div id="panel" style="display:none;">

  <!-- 📊 DASHBOARD -->
  <div class="card">
    <h3>📊 Admin Dashboard</h3>
    <div class="stat">💰 Profit <span id="profit">0</span></div>
    <div class="stat">📊 Bets <span id="totalBets">0</span></div>
    <div class="stat">🧑 Users <span id="totalUsers">0</span></div>
    <div class="stat">📅 Today <span id="todayProfit">0</span></div>
  </div>

  <!-- 🔥 LIVE MATCHES -->
  <div class="card">
    <h3>🔥 Live Matches</h3>
    <div id="liveMatches"></div>
  </div>

  <!-- MATCH SAVE -->
  <div class="card">
    <h3>Matches</h3>
    <input id="m1"><input id="m2"><input id="m3"><input id="m4"><input id="m5">
    <input id="m6"><input id="m7"><input id="m8"><input id="m9"><input id="m10">
    <button onclick="saveMatches()">Save</button>
  </div>

  <!-- BET SETTINGS -->
  <div class="card">
    <h3>Bet Settings</h3>
    <input id="bmatch" placeholder="Match (RCB vs CSK)">
    <input id="min" placeholder="Min Bet">
    <input id="t1odds" placeholder="Team1 Odds (max 3)">
    <input id="t2odds" placeholder="Team2 Odds (max 3)">
    <button onclick="saveBetSettings()">Save</button>
  </div>

  <!-- RESULT -->
  <div class="card">
    <h3>Result</h3>
    <input id="rmatch" placeholder="Match">
    <input id="winnerInput" placeholder="Winner">
    <button onclick="declareResult()">Declare</button>
  </div>

  <!-- WALLET -->
  <div class="card">
    <h3>Wallet</h3>
    <input id="uemail" placeholder="Email">
    <input id="amount" placeholder="Amount">
    <button id="walletBtn">Update</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 LOGIN
onAuthStateChanged(auth,(user)=>{

  if(!user || user.email !== "18stackx@gmail.com"){
    alert("Access Denied ❌");
    return;
  }

  panel.style.display="block";
  loadStats();
  loadLiveMatches();
});

// 📊 STATS
async function loadStats(){

  let snap = await getDoc(doc(db,"admin","stats"));

  if(snap.exists()){
    let d = snap.data();
    profit.innerText = d.profit || 0;
    totalBets.innerText = d.totalBets || 0;
    todayProfit.innerText = d.todayProfit || 0;
  }

  let u = await getDocs(collection(db,"users"));
  totalUsers.innerText = u.size;
}

// 🔥 LIVE MATCH LIST
async function loadLiveMatches(){

  let container = document.getElementById("liveMatches");
  container.innerHTML = "";

  let snap = await getDocs(collection(db,"matches"));

  snap.forEach(docSnap=>{

    let d = docSnap.data();
    let match = docSnap.id;

    if(d.status !== "completed"){

      let div = document.createElement("div");
      div.className = "liveMatch";

      div.innerHTML = `
        <b>${match}</b><br>
        ₹${d.rcbPool||0} vs ₹${d.cskPool||0}<br>
        <button onclick="selectMatch('${match}')">Select</button>
      `;

      container.appendChild(div);
    }

  });
}

// CLICK MATCH
window.selectMatch = (match)=>{
  rmatch.value = match;
};

// MATCH SAVE
window.saveMatches = async ()=>{
  let data = {};
  for(let i=1;i<=10;i++){
    let val = document.getElementById("m"+i).value.trim();
    if(val) data["m"+i] = val;
  }
  await setDoc(doc(db,"matches","today"),data,{merge:true});
  alert("Saved 🔥");
};

// BET SETTINGS
window.saveBetSettings = async ()=>{
  let match = bmatch.value.trim();
  let min = parseInt(min.value);
  let t1 = Math.min(parseFloat(t1odds.value),3);
  let t2 = Math.min(parseFloat(t2odds.value),3);

  await setDoc(doc(db,"matches",match),{
    minBet:min,
    rcbOdds:t1,
    cskOdds:t2,
    rcbPool:0,
    cskPool:0,
    status:"live",
    winner:null
  },{merge:true});

  alert("Saved 😈");
};

// 🏆 RESULT
window.declareResult = async ()=>{

  let match = rmatch.value.trim();
  let winner = winnerInput.value.trim();

  let betsSnap = await getDocs(collection(db,"bets"));

  let totalBet = 0;
  let totalPayout = 0;
  let count = 0;

  for(let b of betsSnap.docs){

    let data = b.data();

    if(data.match === match && data.status !== "done"){

      totalBet += data.amount;

      let userRef = doc(db,"users",data.user);
      let userSnap = await getDoc(userRef);

      if(!userSnap.exists()) continue;

      let userData = userSnap.data();

      let safeOdds = Math.min(data.multiplier,3);

      if(data.team === winner){

        let winAmt = Math.floor(data.amount * safeOdds * 0.9);
        totalPayout += winAmt;

        await updateDoc(userRef,{
          balance:(userData.balance||0)+winAmt,
          history:[...(userData.history||[]),{type:"win",amt:winAmt,time:new Date().toLocaleString()}]
        });

      } else {

        await updateDoc(userRef,{
          history:[...(userData.history||[]),{type:"loss",amt:data.amount,time:new Date().toLocaleString()}]
        });

      }

      await updateDoc(doc(db,"bets",b.id),{status:"done",winner});
      count++;
    }
  }

  let profitCalc = totalBet - totalPayout;

  await updateDoc(doc(db,"matches",match),{
    status:"completed",
    winner:winner
  });

  await setDoc(doc(db,"admin","stats"),{
    profit:profitCalc,
    totalBets:count,
    todayProfit:profitCalc
  },{merge:true});

  alert("Done 😈 Profit ₹"+profitCalc);

  loadStats();
  loadLiveMatches();
};

// WALLET
walletBtn.onclick = async ()=>{

  let email = uemail.value;
  let amt = parseInt(amount.value);

  let ref = doc(db,"users",email);
  let snap = await getDoc(ref);

  let type = amt>0 ? "deposit":"withdraw";

  if(snap.exists()){
    let data = snap.data();

    await updateDoc(ref,{
      balance:(data.balance||0)+amt,
      history:[...(data.history||[]),{type,amt:Math.abs(amt),time:new Date().toLocaleString()}]
    });
  }

  alert("Updated 💰");
};
</script>

</body>
</html>
