<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}
.card{background:#1f2937;padding:20px;margin:20px;border-radius:12px;max-width:400px;margin:auto;margin-top:20px;}
input,select{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px;}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#22c55e;color:white;margin-top:10px;font-weight:bold;}
.stat{display:flex;justify-content:space-between;margin:8px 0;}
.liveMatch{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
label{font-size:12px;color:#9ca3af;}
</style>
</head>

<body>

<div id="panel" style="display:none;">

<div class="card">
<h3>📊 Admin Dashboard</h3>
<div class="stat">🧑 Users <span id="totalUsers">0</span></div>
</div>

<div class="card">
<h3>🔥 Live Matches</h3>
<div id="liveMatches"></div>
</div>

<div class="card">
<h3>📌 Add Matches</h3>
<input id="m1" placeholder="RCB vs CSK">
<input id="m2"><input id="m3"><input id="m4"><input id="m5">
<button onclick="saveMatches()">Save Matches</button>
</div>

<div class="card">
<h3>⚙️ Bet Settings</h3>
<input id="bmatch" placeholder="Match Name">
<input id="minBetInput" placeholder="Min Bet">
<input id="t1odds" placeholder="Team1 Odds">
<input id="t2odds" placeholder="Team2 Odds">
<input id="lockTime" type="datetime-local">
<button onclick="saveBetSettings()">Start Match</button>
</div>

<div class="card">
<h3>🏆 Declare Result</h3>
<input id="rmatch" placeholder="Match">
<input id="winnerInput" placeholder="Winner">
<button onclick="declareResult()">Declare</button>
</div>

<div class="card">
<h3>🎯 Prediction System</h3>

<input id="pMatch" placeholder="Match">
<input id="pQuestion" placeholder="Question">

<input id="opt1" placeholder="Option 1">
<input id="ret1" placeholder="Return">
<input id="opt2" placeholder="Option 2">
<input id="ret2" placeholder="Return">
<input id="opt3" placeholder="Option 3">
<input id="ret3" placeholder="Return">

<input id="pLockTime" type="datetime-local">

<button onclick="savePrediction()">Add Question</button>

<hr>

<select id="predDropdown"></select>
<input id="correctOpt" placeholder="Correct Option">
<button onclick="declarePrediction()">Declare</button>

</div>

<div class="card">
<h3>💰 Wallet</h3>
<input id="uemail" placeholder="Email">
<input id="amount" placeholder="Amount">
<button id="walletBtn">Update</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
authDomain:"stackx-9f92e.firebaseapp.com",
projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(!user || user.email !== "18stackx@gmail.com"){
alert("Access Denied ❌");
return;
}
panel.style.display="block";
loadStats();
loadLiveMatches();
loadPredictions();
});

// USERS
async function loadStats(){
let u = await getDocs(collection(db,"users"));
totalUsers.innerText = u.size;
}

// MATCH LIST
async function loadLiveMatches(){
let container = document.getElementById("liveMatches");
container.innerHTML = "";

let snap = await getDocs(collection(db,"matches"));

snap.forEach(docSnap=>{
let d = docSnap.data();
if(d.status === "live"){
container.innerHTML += `<div class="liveMatch">${docSnap.id}</div>`;
}
});
}

// PRED DROPDOWN
async function loadPredictions(){
let dropdown = document.getElementById("predDropdown");
dropdown.innerHTML = "";

let snap = await getDocs(collection(db,"predictions"));

snap.forEach(docSnap=>{
let d = docSnap.data();
if(d.status === "live"){
dropdown.innerHTML += `<option value="${docSnap.id}">${d.question}</option>`;
}
});
}

// SAVE MATCH
window.saveMatches = async ()=>{
let data = {};
for(let i=1;i<=5;i++){
let val = document.getElementById("m"+i).value.trim();
if(val) data["m"+i] = val;
}
await setDoc(doc(db,"matches","today"),data);
alert("Saved 🔥");
};

// START MATCH
window.saveBetSettings = async ()=>{
await setDoc(doc(db,"matches",bmatch.value.trim()),{
minBet:parseInt(minBetInput.value),
team1Odds:parseFloat(t1odds.value),
team2Odds:parseFloat(t2odds.value),
status:"live",
lockTime:lockTime.value
},{merge:true});
alert("Match Live");
loadLiveMatches();
};

// RESULT
window.declareResult = async ()=>{
let match = rmatch.value.trim();
let winner = winnerInput.value.trim().toLowerCase();

let betsSnap = await getDocs(collection(db,"bets"));

for(let b of betsSnap.docs){
let data = b.data();

if(data.match === match && data.status !== "done"){

let userRef = doc(db,"users",data.user);
let userSnap = await getDoc(userRef);
let u = userSnap.data();

let betTeam = (data.team || "").toLowerCase();
let mult = parseFloat(data.return || data.multiplier || 1);

if(betTeam === winner){

let win = Math.floor(data.amount * mult);

await updateDoc(userRef,{
balance:(u.balance||0)+win,
history:[
...(u.history || []),
{type:"win",amt:win,match:match,team:betTeam,time:new Date().toLocaleString()}
]
});

}else{

await updateDoc(userRef,{
history:[
...(u.history || []),
{type:"loss",amt:data.amount,match:match,team:betTeam,time:new Date().toLocaleString()}
]
});

}

await updateDoc(doc(db,"bets",b.id),{
status:"done",
result: betTeam === winner ? "win" : "loss",
winner
});
}
}

await updateDoc(doc(db,"matches",match),{
status:"completed",
winner,
date:new Date().toLocaleDateString()
});

alert("Result Done");
loadLiveMatches();
};

// ADD PREDICTION
window.savePrediction = async ()=>{
let id = "pred_"+Date.now();

await setDoc(doc(db,"predictions",id),{
match:pMatch.value.trim(),
question:pQuestion.value.trim(),
options:[
{name:opt1.value,return:parseFloat(ret1.value)},
{name:opt2.value,return:parseFloat(ret2.value)},
{name:opt3.value,return:parseFloat(ret3.value)}
],
lockTime:pLockTime.value,
status:"live"
});

alert("Prediction Added 🔥");
loadPredictions();
};

// DECLARE PREDICTION (FIX ADDED ONLY)
window.declarePrediction = async ()=>{
let id = predDropdown.value;
let correct = correctOpt.value.trim();

let betsSnap = await getDocs(collection(db,"predBets"));

for(let b of betsSnap.docs){
let data = b.data();

if(data.predictionId === id && data.status !== "done"){

let userRef = doc(db,"users",data.user);
let snap = await getDoc(userRef);
let u = snap.data();

if(data.option === correct){

let win = data.amount * data.return;

await updateDoc(userRef,{
balance:(u.balance||0)+win,
history:[
...(u.history || []),
{type:"win",amt:win,match:id,time:new Date().toLocaleString()}
]
});

}else{

await updateDoc(userRef,{
history:[
...(u.history || []),
{type:"loss",amt:data.amount,match:id,time:new Date().toLocaleString()}
]
});

}

await updateDoc(doc(db,"predBets",b.id),{
status:"done"
});
}
}

await updateDoc(doc(db,"predictions",id),{
status:"completed",
correct
});

alert("Prediction Result Done");
loadPredictions();
};

// WALLET
walletBtn.onclick = async ()=>{
let ref = doc(db,"users",uemail.value.trim());
let snap = await getDoc(ref);

if(snap.exists()){
let d = snap.data();
await updateDoc(ref,{
balance:(d.balance||0)+parseInt(amount.value)
});
}

alert("Wallet Updated 💰");
};

</script>
</body>
</html>
