<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      margin-top:30px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>🔐 Admin Login</h3>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <!-- MATCH SECTION -->
  <div class="card">
    <h3>Update Matches</h3>

    <input id="m1" placeholder="Match 1">
    <input id="m2" placeholder="Match 2">
    <input id="m3" placeholder="Match 3">
    <input id="m4" placeholder="Match 4">
    <input id="m5" placeholder="Match 5">

    <button id="saveBtn">Save Matches</button>
    <button id="apiBtn">⚡ Fetch Matches (API)</button>
  </div>

  <!-- WALLET SECTION -->
  <div class="card">
    <h3>💰 Update User Wallet</h3>

    <input id="uemail" placeholder="User Email">
    <input id="amount" placeholder="Amount (+/-)">

    <button id="walletBtn">Update Balance</button>
  </div>

</div>

<script>
// 🔐 LOGIN
const ADMIN_USER = "abhibababr";
const ADMIN_PASS = "943188@.";

document.getElementById("loginBtn").onclick = function(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong ID/Password ❌");
  }
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 MANUAL MATCH SAVE
document.getElementById("saveBtn").onclick = async ()=>{
  await setDoc(doc(db,"matches","today"),{
    m1:m1.value,
    m2:m2.value,
    m3:m3.value,
    m4:m4.value,
    m5:m5.value
  });

  alert("Matches Updated 🔥");
};

// ⚡ API FETCH (cricketdata.org)
document.getElementById("apiBtn").onclick = async ()=>{
  try{

    let res = await fetch("https://api.cricketdata.org/v1/matches?apikey=c51049f9-0d1d-45b8-80a6-c2d80e95da65");
    let data = await res.json();

    let matches = data.matches || [];

    let m1 = matches[0] ? matches[0].teamInfo?.[0]?.name + " vs " + matches[0].teamInfo?.[1]?.name : "";
    let m2 = matches[1] ? matches[1].teamInfo?.[0]?.name + " vs " + matches[1].teamInfo?.[1]?.name : "";
    let m3 = matches[2] ? matches[2].teamInfo?.[0]?.name + " vs " + matches[2].teamInfo?.[1]?.name : "";
    let m4 = matches[3] ? matches[3].teamInfo?.[0]?.name + " vs " + matches[3].teamInfo?.[1]?.name : "";
    let m5 = matches[4] ? matches[4].teamInfo?.[0]?.name + " vs " + matches[4].teamInfo?.[1]?.name : "";

    await setDoc(doc(db,"matches","today"),{
      m1,m2,m3,m4,m5
    });

    alert("Matches Auto Updated 😈🔥");

  }catch(err){
    alert("API Error ❌");
    console.log(err);
  }
};

// 💰 WALLET UPDATE
document.getElementById("walletBtn").onclick = async ()=>{
  let email = document.getElementById("uemail").value.trim();
  let amt = parseInt(document.getElementById("amount").value);

  if(!email || isNaN(amt)){
    alert("Fill all fields");
    return;
  }

  const ref = doc(db,"users",email);
  const snap = await getDoc(ref);

  if(snap.exists()){
    let old = snap.data().balance || 0;
    let newBalance = old + amt;

    if(newBalance < 0){
      alert("Insufficient Balance ❌");
      return;
    }

    await updateDoc(ref,{ balance:newBalance });

  } else {
    if(amt < 0){
      alert("User not found ❌");
      return;
    }

    await setDoc(ref,{ balance:amt });
  }

  alert("Wallet Updated 💰");
};
</script>

</body>
</html>
