<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      margin-top:40px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>🔐 Admin Login</h3>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <!-- MATCH SECTION -->
  <div class="card">
    <h3>Update Matches</h3>

    <input id="m1" placeholder="Match 1">
    <input id="m2" placeholder="Match 2">
    <input id="m3" placeholder="Match 3">
    <input id="m4" placeholder="Match 4">
    <input id="m5" placeholder="Match 5">

    <button id="saveBtn">Save Matches</button>
  </div>

  <!-- WALLET SECTION -->
  <div class="card">
    <h3>💰 Update User Wallet</h3>

    <input id="uemail" placeholder="User Email">
    <input id="amount" placeholder="Amount">

    <button id="walletBtn">Update Balance</button>
  </div>

</div>

<script>
// 🔐 LOGIN
const ADMIN_USER = "abhibababr";
const ADMIN_PASS = "943188@.";

document.getElementById("loginBtn").onclick = function(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong ID/Password ❌");
  }
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 SAVE MATCHES
document.getElementById("saveBtn").onclick = async function(){
  await setDoc(doc(db,"matches","today"),{
    m1:m1.value,
    m2:m2.value,
    m3:m3.value,
    m4:m4.value,
    m5:m5.value
  });

  alert("Matches Updated 🔥");
};

// 💰 UPDATE WALLET
document.getElementById("walletBtn").onclick = async function(){

  let email = document.getElementById("uemail").value;
  let amt = parseInt(document.getElementById("amount").value);

  if(!email || !amt){
    alert("Fill all fields");
    return;
  }

  const ref = doc(db,"users",email);
  const snap = await getDoc(ref);

  if(snap.exists()){
    let old = snap.data().balance || 0;

    await updateDoc(ref,{
      balance: old + amt
    });

  } else {
    await setDoc(ref,{
      balance: amt
    });
  }

  alert("Wallet Updated 💰");
};
</script>

</body>
</html>
