<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      margin:0;
    }

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:12px;
      max-width:400px;
      margin:auto;
      margin-top:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      font-weight:bold;
    }

    .stat{
      display:flex;
      justify-content:space-between;
      margin:8px 0;
    }

    .liveMatch{
      background:#111;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div id="panel" style="display:none;">

  <div class="card">
    <h3>📊 Admin Dashboard</h3>
    <div class="stat">💰 Profit <span id="profit">0</span></div>
    <div class="stat">📊 Bets <span id="totalBets">0</span></div>
    <div class="stat">🧑 Users <span id="totalUsers">0</span></div>
    <div class="stat">📅 Today <span id="todayProfit">0</span></div>
  </div>

  <div class="card">
    <h3>🔥 Live Matches</h3>
    <div id="liveMatches"></div>
  </div>

  <div class="card">
    <h3>Matches</h3>
    <input id="m1"><input id="m2"><input id="m3"><input id="m4"><input id="m5">
    <input id="m6"><input id="m7"><input id="m8"><input id="m9"><input id="m10">
    <button onclick="saveMatches()">Save</button>
  </div>

  <div class="card">
    <h3>Bet Settings</h3>
    <input id="bmatch" placeholder="Match (RCB vs CSK)">
    <input id="minBetInput" placeholder="Min Bet">
    <input id="t1odds" placeholder="Team1 Odds (max 3)">
    <input id="t2odds" placeholder="Team2 Odds (max 3)">
    <button onclick="saveBetSettings()">Save</button>
  </div>

  <div class="card">
    <h3>Result</h3>
    <input id="rmatch" placeholder="Match">
    <input id="winnerInput" placeholder="Winner">
    <button onclick="declareResult()">Declare</button>
  </div>

  <!-- 🔥 NEW: QUESTION SYSTEM -->
  <div class="card">
    <h3>🎯 Prediction System</h3>

    <input id="pMatch" placeholder="Match">
    <input id="pQuestion" placeholder="Question">

    <input id="opt1" placeholder="Option 1">
    <input id="ret1" placeholder="Return (max 3x)">

    <input id="opt2" placeholder="Option 2">
    <input id="ret2" placeholder="Return">

    <input id="opt3" placeholder="Option 3">
    <input id="ret3" placeholder="Return">

    <button onclick="savePrediction()">Add Question</button>

    <hr style="margin:15px 0;">

    <input id="predId" placeholder="Prediction ID">
    <input id="correctOpt" placeholder="Correct Option">

    <button onclick="declarePrediction()">Declare Result</button>
  </div>

  <div class="card">
    <h3>Wallet</h3>
    <input id="uemail" placeholder="Email">
    <input id="amount" placeholder="Amount">
    <button id="walletBtn">Update</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN
onAuthStateChanged(auth,(user)=>{
  if(!user || user.email !== "18stackx@gmail.com"){
    alert("Access Denied ❌");
    return;
  }
  document.getElementById("panel").style.display="block";
  loadStats();
  loadLiveMatches();
});

// 🔥 SAVE PREDICTION
window.savePrediction = async ()=>{

  let match = pMatch.value.trim();
  let question = pQuestion.value.trim();

  let options = [
    {name:opt1.value, return:Math.min(parseFloat(ret1.value),3), pool:0},
    {name:opt2.value, return:Math.min(parseFloat(ret2.value),3), pool:0},
    {name:opt3.value, return:Math.min(parseFloat(ret3.value),3), pool:0}
  ];

  let id = "pred_"+Date.now();

  await setDoc(doc(db,"predictions",id),{
    match,
    question,
    options,
    status:"live",
    correct:null
  });

  alert("Question Added 🔥 ID: "+id);
};

// 🔥 DECLARE PREDICTION RESULT
window.declarePrediction = async ()=>{

  let id = predId.value.trim();
  let correct = correctOpt.value.trim();

  let betsSnap = await getDocs(collection(db,"predBets"));

  for(let b of betsSnap.docs){

    let data = b.data();

    if(data.predictionId === id && data.status !== "done"){

      let userRef = doc(db,"users",data.user);
      let userSnap = await getDoc(userRef);

      if(!userSnap.exists()) continue;

      let userData = userSnap.data();

      if(data.option === correct){

        let winAmt = Math.floor(data.amount * 2 * 0.9);

        await updateDoc(userRef,{
          balance:(userData.balance||0)+winAmt
        });
      }

      await updateDoc(doc(db,"predBets",b.id),{status:"done"});
    }
  }

  await updateDoc(doc(db,"predictions",id),{
    status:"completed",
    correct
  });

  alert("Prediction Done 😈");
};

</script>

</body>
</html>
