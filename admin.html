<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel - StackX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background:#0b0f1a;
      color:white;
    }

    .header{
      padding:15px;
      background:#111827;
      text-align:center;
    }

    .container{
      padding:15px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:12px;
      max-width:400px;
      margin:auto;
      margin-top:40px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      font-weight:bold;
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>🔐 Admin Login</h3>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <div class="header">
    <h2>⚙️ Admin Panel</h2>
  </div>

  <div class="container">
    <div class="card">

      <h3>Update Matches</h3>

      <input id="m1" placeholder="Match 1">
      <input id="m2" placeholder="Match 2">
      <input id="m3" placeholder="Match 3">
      <input id="m4" placeholder="Match 4">
      <input id="m5" placeholder="Match 5">

      <button onclick="save()">Save Matches</button>

    </div>
  </div>
</div>

<script>
// 🔐 LOGIN CHECK
const ADMIN_USER = "abhibababr";
const ADMIN_PASS = "943188@.";

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong ID or Password ❌");
  }
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 SAVE MATCHES
window.save = async ()=>{
  await setDoc(doc(db,"matches","today"),{
    m1:document.getElementById("m1").value,
    m2:document.getElementById("m2").value,
    m3:document.getElementById("m3").value,
    m4:document.getElementById("m4").value,
    m5:document.getElementById("m5").value
  });

  alert("Matches Updated 🔥");
};
</script>

</body>
</html>
