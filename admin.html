<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      margin-top:30px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>🔐 Admin Login</h3>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <!-- MATCH LIST -->
  <div class="card">
    <h3>Update Matches (Max 10)</h3>

    <input id="m1" placeholder="Match 1">
    <input id="m2" placeholder="Match 2">
    <input id="m3" placeholder="Match 3">
    <input id="m4" placeholder="Match 4">
    <input id="m5" placeholder="Match 5">
    <input id="m6" placeholder="Match 6">
    <input id="m7" placeholder="Match 7">
    <input id="m8" placeholder="Match 8">
    <input id="m9" placeholder="Match 9">
    <input id="m10" placeholder="Match 10">

    <button onclick="saveMatches()">Save Matches</button>
  </div>

  <!-- MATCH BET SETTINGS -->
  <div class="card">
    <h3>Match Betting Settings</h3>

    <input id="bmatch" placeholder="Match Name (RCB vs CSK)">
    <input id="min" placeholder="Minimum Bet ₹">
    <input id="multi" placeholder="Multiplier (1.5 / 2 / 3)">

    <button onclick="saveBetSettings()">Save Bet Settings</button>
  </div>

  <!-- WALLET (UNCHANGED ✅) -->
  <div class="card">
    <h3>💰 Update User Wallet</h3>

    <input id="uemail" placeholder="User Email">
    <input id="amount" placeholder="Amount (+/-)">

    <button id="walletBtn">Update Balance</button>
  </div>

</div>

<script>
// 🔐 LOGIN
document.getElementById("loginBtn").onclick = function(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  if(u === "abhibababr" && p === "943188@."){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong ID/Password ❌");
  }
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 SAVE 10 MATCHES
window.saveMatches = async ()=>{
  await setDoc(doc(db,"matches","today"),{
    m1:m1.value,
    m2:m2.value,
    m3:m3.value,
    m4:m4.value,
    m5:m5.value,
    m6:m6.value,
    m7:m7.value,
    m8:m8.value,
    m9:m9.value,
    m10:m10.value
  });

  alert("10 Matches Updated 🔥");
};

// 🔥 SAVE BET SETTINGS
window.saveBetSettings = async ()=>{
  let match = document.getElementById("bmatch").value;
  let min = parseInt(document.getElementById("min").value);
  let multi = parseFloat(document.getElementById("multi").value);

  if(!match || !min || !multi){
    alert("Fill all fields ❌");
    return;
  }

  await setDoc(doc(db,"matches",match),{
    minBet:min,
    multiplier:multi
  });

  alert("Bet Settings Saved 😈🔥");
};

// 💰 WALLET (UNCHANGED)
document.getElementById("walletBtn").onclick = async ()=>{
  let email = document.getElementById("uemail").value.trim();
  let amt = parseInt(document.getElementById("amount").value);

  if(!email || isNaN(amt)){
    alert("Fill all fields");
    return;
  }

  const ref = doc(db,"users",email);
  const snap = await getDoc(ref);

  if(snap.exists()){
    let old = snap.data().balance || 0;
    let newBalance = old + amt;

    if(newBalance < 0){
      alert("Insufficient Balance ❌");
      return;
    }

    await updateDoc(ref,{ balance:newBalance });

  } else {
    if(amt < 0){
      alert("User not found ❌");
      return;
    }

    await setDoc(ref,{ balance:amt });
  }

  alert("Wallet Updated 💰");
};
</script>

</body>
</html>
