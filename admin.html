<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black;color:white;text-align:center;padding:30px">

<h2>🔥 Admin Panel</h2>

<button id="btn">Add All Teams</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 BUTTON CLICK FIX
document.getElementById("btn").onclick = async () => {

  try{

    await setDoc(doc(db,"teams","RCB"),{
      players:["Virat Kohli","Rajat Patidar"]
    });

    await setDoc(doc(db,"teams","CSK"),{
      players:["MS Dhoni","Ruturaj"]
    });

    await setDoc(doc(db,"teams","MI"),{
      players:["Rohit Sharma","Hardik"]
    });

    alert("🔥 Working! Teams added");

  }catch(e){
    console.log(e);
    alert("Error ❌");
  }

};

</script>

</body>
</html>
