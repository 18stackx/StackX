<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;padding:10px;}

    .box{
      max-width:300px;
      margin:auto;
      margin-top:50px;
      background:#1f2937;
      padding:20px;
      border-radius:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:none;
    }

    button{
      width:100%;
      padding:10px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      color:white;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div id="loginBox" class="box">
  <h3>Admin Login</h3>
  <input type="text" id="user" placeholder="User ID">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" style="display:none;">

  <h2>Admin - Matches</h2>

  <input id="m1" placeholder="Match 1">
  <input id="m2" placeholder="Match 2">
  <input id="m3" placeholder="Match 3">
  <input id="m4" placeholder="Match 4">
  <input id="m5" placeholder="Match 5">

  <button onclick="save()">Save Matches</button>

</div>

<script>
const ADMIN_USER = "abhi";
const ADMIN_PASS = "1234";

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong ID/Password");
  }
}

// SAVE MATCHES
function save(){
  let data = {
    m1:m1.value,
    m2:m2.value,
    m3:m3.value,
    m4:m4.value,
    m5:m5.value
  };

  localStorage.setItem("matches", JSON.stringify(data));
  alert("Matches Saved 🔥");
}
</script>

</body>
</html>
