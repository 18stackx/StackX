<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:10px;
      max-width:400px;
      margin:auto;
      margin-top:30px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>🔐 Admin Login</h3>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none;">

  <!-- MATCH LIST -->
  <div class="card">
    <h3>Update Matches (Max 10)</h3>

    <input id="m1"><input id="m2"><input id="m3"><input id="m4"><input id="m5">
    <input id="m6"><input id="m7"><input id="m8"><input id="m9"><input id="m10">

    <button onclick="saveMatches()">Save Matches</button>
  </div>

  <!-- BET SETTINGS -->
  <div class="card">
    <h3>Match Betting Settings</h3>

    <input id="bmatch" placeholder="Match Name (RCB vs CSK)">
    <input id="min" placeholder="Minimum Bet ₹">
    <input id="multi" placeholder="Multiplier">

    <button onclick="saveBetSettings()">Save Bet Settings</button>
  </div>

  <!-- 🏆 RESULT -->
  <div class="card">
    <h3>🏆 Declare Result (Auto Payout)</h3>

    <input id="rmatch" placeholder="Match Name">
    <input id="winner" placeholder="Winner Team">

    <button onclick="declareResult()">Declare & Pay</button>
  </div>

  <!-- WALLET -->
  <div class="card">
    <h3>💰 Update User Wallet</h3>

    <input id="uemail" placeholder="User Email">
    <input id="amount" placeholder="Amount (+/-)">

    <button id="walletBtn">Update Balance</button>
  </div>

</div>

<script>
// LOGIN
loginBtn.onclick = function(){
  if(user.value==="abhibababr" && pass.value==="943188@."){
    loginBox.style.display="none";
    panel.style.display="block";
  } else {
    alert("Wrong ID ❌");
  }
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);

// 🔥 SAVE MATCHES
window.saveMatches = async ()=>{
  await setDoc(doc(db,"matches","today"),{
    m1:m1.value,m2:m2.value,m3:m3.value,m4:m4.value,m5:m5.value,
    m6:m6.value,m7:m7.value,m8:m8.value,m9:m9.value,m10:m10.value
  });
  alert("Matches Updated 🔥");
};

// 🔥 SAVE BET SETTINGS
window.saveBetSettings = async ()=>{
  await setDoc(doc(db,"matches",bmatch.value),{
    minBet:parseInt(min.value),
    multiplier:parseFloat(multi.value)
  });
  alert("Settings Saved 😈");
};

// 🏆 FINAL AUTO PAYOUT (UPGRADED)
window.declareResult = async function(){

  let match = document.getElementById("rmatch").value.trim();
  let winner = document.getElementById("winner").value.trim();

  if(!match || !winner){
    alert("Fill all ❌");
    return;
  }

  let betsSnap = await getDocs(collection(db,"bets"));

  let count = 0;

  for(let b of betsSnap.docs){

    let data = b.data();

    // ✅ ONLY PENDING BETS
    if(data.match === match && data.status !== "done"){

      let userRef = doc(db,"users",data.user);
      let userSnap = await getDoc(userRef);

      if(!userSnap.exists()) continue;

      let userData = userSnap.data();
      let balance = userData.balance || 0;

      // ✅ WIN
      if(data.team === winner){

        let winAmt = Math.floor(data.amount * data.multiplier);

        await updateDoc(userRef,{
          balance: balance + winAmt,
          history:[
            ...(userData.history || []),
            {
              type:"deposit",
              amt:winAmt,
              time:new Date().toLocaleString()
            }
          ]
        });

      } else {

        // ❌ LOSS
        await updateDoc(userRef,{
          history:[
            ...(userData.history || []),
            {
              type:"withdraw",
              amt:data.amount,
              time:new Date().toLocaleString()
            }
          ]
        });

      }

      // 🔥 MARK DONE (MOST IMPORTANT)
      await updateDoc(doc(db,"bets",b.id),{
        status:"done"
      });

      count++;
    }
  }

  alert("Result Declared 😈🔥\nProcessed Bets: "+count);
};

// 💰 WALLET (UNCHANGED)
walletBtn.onclick = async ()=>{
  let email=uemail.value.trim();
  let amt=parseInt(amount.value);

  const ref=doc(db,"users",email);
  const snap=await getDoc(ref);

  if(snap.exists()){
    let newBal=(snap.data().balance||0)+amt;
    if(newBal<0) return alert("Low balance");
    await updateDoc(ref,{balance:newBal});
  } else {
    if(amt<0) return alert("User not found");
    await setDoc(ref,{balance:amt});
  }

  alert("Wallet Updated 💰");
};
</script>

</body>
</html>
