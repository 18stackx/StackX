<script type="module">

// 📊 LOAD STATS
async function loadStats(){

  let snap = await getDoc(doc(db,"admin","stats"));

  if(snap.exists()){
    let d = snap.data();

    profit.innerText = d.profit || 0;
    totalBets.innerText = d.totalBets || 0;
    todayProfit.innerText = d.todayProfit || 0;
  }

  let usersSnap = await getDocs(collection(db,"users"));
  totalUsers.innerText = usersSnap.size;
}

// 🔥 SAVE MATCHES
window.saveMatches = async ()=>{
  let data = {};
  for(let i=1;i<=10;i++){
    let val = document.getElementById("m"+i).value.trim();
    if(val) data["m"+i] = val;
  }

  await setDoc(doc(db,"matches","today"),data,{merge:true});
  alert("Matches Updated 🔥");
};

// 🔥 SAVE ODDS
window.saveBetSettings = async ()=>{

  let match = bmatch.value.trim();
  let minBet = parseInt(min.value);
  let t1 = parseFloat(t1odds.value);
  let t2 = parseFloat(t2odds.value);

  if(!match || isNaN(minBet) || isNaN(t1) || isNaN(t2)){
    alert("Fill properly ❌");
    return;
  }

  await setDoc(doc(db,"matches",match),{
    minBet,
    rcbOdds:t1,
    cskOdds:t2,
    rcbPool:0,
    cskPool:0
  },{merge:true});

  alert("Saved 😈");
};

// 🔒 DOUBLE CLICK PROTECTION
let declaring = false;

// 🏆 RESULT + PROFIT TRACK
window.declareResult = async ()=>{

  if(declaring) return;
  declaring = true;

  try{

    let match = rmatch.value.trim();
    let winner = winnerInput.value.trim();

    if(!match || !winner){
      alert("Fill all ❌");
      declaring = false;
      return;
    }

    let betsSnap = await getDocs(collection(db,"bets"));

    let count = 0;
    let totalBet = 0;
    let totalPayout = 0;

    for(let b of betsSnap.docs){

      let data = b.data();

      if(data.match === match && data.status !== "done"){

        totalBet += data.amount;

        let userRef = doc(db,"users",data.user);
        let userSnap = await getDoc(userRef);

        if(!userSnap.exists()) continue;

        let userData = userSnap.data();
        let balance = userData.balance || 0;

        if(data.team === winner){

          let winAmt = Math.floor(data.amount * data.multiplier);
          totalPayout += winAmt;

          await updateDoc(userRef,{
            balance: balance + winAmt,
            history:[
              ...(userData.history||[]),
              {
                type:"win",
                amt:winAmt,
                time:new Date().toLocaleString()
              }
            ]
          });

        } else {

          await updateDoc(userRef,{
            history:[
              ...(userData.history||[]),
              {
                type:"loss",
                amt:data.amount,
                time:new Date().toLocaleString()
              }
            ]
          });

        }

        await updateDoc(doc(db,"bets",b.id),{
          status:"done",
          winner
        });

        count++;
      }
    }

    let profitCalc = totalBet - totalPayout;

    let today = new Date().toLocaleDateString();
    let ref = doc(db,"admin","stats");
    let snap = await getDoc(ref);

    if(snap.exists()){
      let d = snap.data();

      await updateDoc(ref,{
        profit:(d.profit||0)+profitCalc,
        totalBets:(d.totalBets||0)+count,
        todayProfit: d.date===today ? (d.todayProfit||0)+profitCalc : profitCalc,
        date:today
      });

    } else {
      await setDoc(ref,{
        profit:profitCalc,
        totalBets:count,
        todayProfit:profitCalc,
        date:today
      });
    }

    alert("Result Done 😈🔥 Profit: ₹"+profitCalc);

    loadStats();

  }catch(err){
    console.error(err);
    alert("Error ❌");
  }

  declaring = false;
};

// 💰 WALLET (🔥 FIXED HISTORY)
walletBtn.onclick = async ()=>{

  let email = uemail.value.trim();
  let amt = parseInt(amount.value);

  if(!email || isNaN(amt)){
    alert("Invalid input ❌");
    return;
  }

  const ref = doc(db,"users",email);
  const snap = await getDoc(ref);

  let type = amt > 0 ? "deposit" : "withdraw";

  if(snap.exists()){

    let data = snap.data();
    let newBal = (data.balance || 0) + amt;

    if(newBal < 0) return alert("Low balance");

    await updateDoc(ref,{
      balance:newBal,
      history:[
        ...(data.history||[]),
        {
          type:type,
          amt:Math.abs(amt),
          time:new Date().toLocaleString()
        }
      ]
    });

  } else {

    if(amt < 0) return alert("User not found");

    await setDoc(ref,{
      balance:amt,
      history:[
        {
          type:"deposit",
          amt:amt,
          time:new Date().toLocaleString()
        }
      ]
    });
  }

  alert("Wallet Updated 💰");
};

</script>
