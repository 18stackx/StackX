<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;padding:10px;}
    input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;}
    button{padding:10px;width:100%;background:#22c55e;border:none;border-radius:8px;color:white;}
  </style>
</head>

<body>

<h2>Admin - Matches</h2>

<input id="m1" placeholder="Match 1">
<input id="m2" placeholder="Match 2">
<input id="m3" placeholder="Match 3">
<input id="m4" placeholder="Match 4">
<input id="m5" placeholder="Match 5">

<button onclick="save()">Save Matches</button>

<script>
function save(){
  let data = {
    m1:m1.value,
    m2:m2.value,
    m3:m3.value,
    m4:m4.value,
    m5:m5.value
  };

  localStorage.setItem("matches", JSON.stringify(data));

  alert("Saved 🔥");
}
</script>

</body>
</html>
