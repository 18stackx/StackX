<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}
    .card{background:#1f2937;padding:20px;margin:20px;border-radius:12px;max-width:400px;margin:auto;margin-top:20px;}
    input,select{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px;}
    button{width:100%;padding:12px;border:none;border-radius:8px;background:#22c55e;color:white;margin-top:10px;font-weight:bold;}
    .stat{display:flex;justify-content:space-between;margin:8px 0;}
    .liveMatch{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
    label{font-size:12px;color:#9ca3af;}
  </style>
</head>

<body>

<div id="panel" style="display:none;">

  <div class="card">
    <h3>📊 Admin Dashboard</h3>
    <div class="stat">💰 Profit <span id="profit">0</span></div>
    <div class="stat">📊 Bets <span id="totalBets">0</span></div>
    <div class="stat">🧑 Users <span id="totalUsers">0</span></div>
    <div class="stat">📅 Today <span id="todayProfit">0</span></div>
  </div>

  <div class="card">
    <h3>🔥 Live Matches</h3>
    <div id="liveMatches"></div>
  </div>

  <div class="card">
    <h3>📌 Add Matches (Home Page)</h3>
    <label>Example: RCB vs CSK</label>
    <input id="m1" placeholder="Match 1">
    <input id="m2" placeholder="Match 2">
    <input id="m3" placeholder="Match 3">
    <input id="m4" placeholder="Match 4">
    <input id="m5" placeholder="Match 5">
    <input id="m6" placeholder="Match 6">
    <input id="m7" placeholder="Match 7">
    <input id="m8" placeholder="Match 8">
    <input id="m9" placeholder="Match 9">
    <input id="m10" placeholder="Match 10">
    <button onclick="saveMatches()">Save Matches</button>
  </div>

  <div class="card">
    <h3>⚙️ Bet Settings</h3>

    <label>Match Name (same as above)</label>
    <input id="bmatch" placeholder="RCB vs CSK">

    <label>Minimum Bet Amount</label>
    <input id="minBetInput" placeholder="10">

    <label>Team 1 Odds (max 3)</label>
    <input id="t1odds" placeholder="2">

    <label>Team 2 Odds (max 3)</label>
    <input id="t2odds" placeholder="2">

    <label>Bet Lock Time (match start time)</label>
    <input id="lockTime" type="datetime-local">

    <button onclick="saveBetSettings()">Start Match</button>
  </div>

  <div class="card">
    <h3>🏆 Declare Result</h3>

    <label>Match Name</label>
    <input id="rmatch" placeholder="RCB vs CSK">

    <label>Winner Team Name</label>
    <input id="winnerInput" placeholder="RCB">

    <button onclick="declareResult()">Declare</button>
  </div>

  <div class="card">
    <h3>🎯 Prediction System</h3>

    <label>Match Name</label>
    <input id="pMatch" placeholder="RCB vs CSK">

    <label>Question</label>
    <input id="pQuestion" placeholder="Who will hit first six?">

    <label>Option 1</label>
    <input id="opt1" placeholder="Virat Kohli">
    <input id="ret1" placeholder="Return (e.g. 2)">

    <label>Option 2</label>
    <input id="opt2" placeholder="Rohit Sharma">
    <input id="ret2" placeholder="Return">

    <label>Option 3</label>
    <input id="opt3" placeholder="Other">
    <input id="ret3" placeholder="Return">

    <label>Question Lock Time</label>
    <input id="pLockTime" type="datetime-local">

    <button onclick="savePrediction()">Add Question</button>

    <hr>

    <label>Select Question (auto load)</label>
    <select id="predDropdown"></select>

    <label>Correct Option (exact same text)</label>
    <input id="correctOpt" placeholder="Virat Kohli">

    <button onclick="declarePrediction()">Declare</button>
  </div>

  <div class="card">
    <h3>💰 Wallet</h3>

    <label>User Email</label>
    <input id="uemail" placeholder="user@gmail.com">

    <label>Amount (+ add / - deduct)</label>
    <input id="amount" placeholder="100 or -50">

    <button id="walletBtn">Update</button>
  </div>

</div>

<!-- ⚡ SCRIPT SAME (UNCHANGED) -->
<script type="module">
/* TERA PURA FIREBASE CODE SAME RAHEGA */
</script>

</body>
</html>
