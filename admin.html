<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{background:#0b0f1a;color:white;font-family:Arial;margin:0;}
    .card{background:#1f2937;padding:20px;margin:20px;border-radius:12px;max-width:400px;margin:auto;margin-top:20px;}
    input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px;}
    button{width:100%;padding:12px;border:none;border-radius:8px;background:#22c55e;color:white;margin-top:10px;font-weight:bold;}
    .stat{display:flex;justify-content:space-between;margin:8px 0;}
    .liveMatch{background:#111;padding:10px;margin-top:10px;border-radius:10px;}
  </style>
</head>

<body>

<div id="panel" style="display:none;">

  <div class="card">
    <h3>📊 Admin Dashboard</h3>
    <div class="stat">💰 Profit <span id="profit">0</span></div>
    <div class="stat">📊 Bets <span id="totalBets">0</span></div>
    <div class="stat">🧑 Users <span id="totalUsers">0</span></div>
    <div class="stat">📅 Today <span id="todayProfit">0</span></div>
  </div>

  <div class="card">
    <h3>🔥 Live Matches</h3>
    <div id="liveMatches"></div>
  </div>

  <div class="card">
    <h3>📌 Add Matches (Home Page)</h3>
    <input id="m1" placeholder="Match 1">
    <input id="m2" placeholder="Match 2">
    <input id="m3" placeholder="Match 3">
    <input id="m4" placeholder="Match 4">
    <input id="m5" placeholder="Match 5">
    <input id="m6" placeholder="Match 6">
    <input id="m7" placeholder="Match 7">
    <input id="m8" placeholder="Match 8">
    <input id="m9" placeholder="Match 9">
    <input id="m10" placeholder="Match 10">
    <button onclick="saveMatches()">Save Matches</button>
  </div>

  <div class="card">
    <h3>⚙️ Bet Settings</h3>
    <input id="bmatch" placeholder="Match Name">
    <input id="minBetInput" placeholder="Min Bet">
    <input id="t1odds" placeholder="Team1 Odds">
    <input id="t2odds" placeholder="Team2 Odds">
    <input id="lockTime" type="datetime-local">
    <button onclick="saveBetSettings()">Start Match</button>
  </div>

  <div class="card">
    <h3>🏆 Declare Result</h3>
    <input id="rmatch" placeholder="Match">
    <input id="winnerInput" placeholder="Winner">
    <button onclick="declareResult()">Declare</button>
  </div>

  <div class="card">
    <h3>🎯 Prediction System</h3>

    <input id="pMatch" placeholder="Match">
    <input id="pQuestion" placeholder="Question">

    <input id="opt1" placeholder="Option 1">
    <input id="ret1" placeholder="Return">
    <input id="opt2" placeholder="Option 2">
    <input id="ret2" placeholder="Return">
    <input id="opt3" placeholder="Option 3">
    <input id="ret3" placeholder="Return">

    <input id="pLockTime" type="datetime-local">

    <button onclick="savePrediction()">Add Question</button>

    <hr>

    <input id="predId" placeholder="Prediction ID">
    <input id="correctOpt" placeholder="Correct Option">
    <button onclick="declarePrediction()">Declare</button>
  </div>

  <div class="card">
    <h3>💰 Wallet</h3>
    <input id="uemail" placeholder="Email">
    <input id="amount" placeholder="Amount">
    <button id="walletBtn">Update</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN
onAuthStateChanged(auth,(user)=>{
  if(!user || user.email !== "18stackx@gmail.com"){
    alert("Access Denied ❌");
    return;
  }
  document.getElementById("panel").style.display="block";
});

// SAVE MATCHES
window.saveMatches = async ()=>{
  let data = {};
  for(let i=1;i<=10;i++){
    let val = document.getElementById("m"+i).value.trim();
    if(val) data["m"+i] = val;
  }
  await setDoc(doc(db,"matches","today"),data,{merge:true});
  alert("Saved 🔥");
};

// BET SETTINGS
window.saveBetSettings = async ()=>{
  await setDoc(doc(db,"matches",bmatch.value.trim()),{
    minBet:parseInt(minBetInput.value),
    rcbOdds:parseFloat(t1odds.value),
    cskOdds:parseFloat(t2odds.value),
    status:"live",
    lockTime:lockTime.value,
    date:new Date().toLocaleDateString('en-IN')
  },{merge:true});
  alert("Match Live 😈");
};

// RESULT
window.declareResult = async ()=>{
  let match = rmatch.value.trim();
  let winner = winnerInput.value.trim();

  let betsSnap = await getDocs(collection(db,"bets"));

  for(let b of betsSnap.docs){
    let data = b.data();

    if(data.match === match && data.status !== "done"){
      let userRef = doc(db,"users",data.user);
      let u = (await getDoc(userRef)).data();

      if(data.team === winner){
        let win = Math.floor(data.amount * data.multiplier * 0.9);
        await updateDoc(userRef,{balance:(u.balance||0)+win});
      }

      await updateDoc(doc(db,"bets",b.id),{status:"done"});
    }
  }

  await updateDoc(doc(db,"matches",match),{status:"completed",winner});
  alert("Result Done 🔥");
};

// PREDICTION SAVE
window.savePrediction = async ()=>{
  let id = "pred_"+Date.now();

  await setDoc(doc(db,"predictions",id),{
    match:pMatch.value.trim(),
    question:pQuestion.value.trim(),
    options:[
      {name:opt1.value,return:parseFloat(ret1.value)},
      {name:opt2.value,return:parseFloat(ret2.value)},
      {name:opt3.value,return:parseFloat(ret3.value)}
    ],
    lockTime:pLockTime.value,
    status:"live"
  });

  alert("Question Added 🔥");
};

// DECLARE PREDICTION
window.declarePrediction = async ()=>{
  let id = predId.value.trim();
  let correct = correctOpt.value.trim();

  let betsSnap = await getDocs(collection(db,"predBets"));

  for(let b of betsSnap.docs){
    let data = b.data();

    if(data.predictionId === id && data.status !== "done"){

      let userRef = doc(db,"users",data.user);
      let u = (await getDoc(userRef)).data();

      if(data.option === correct){
        let win = Math.floor(data.amount * data.return * 0.9);
        await updateDoc(userRef,{balance:(u.balance||0)+win});
      }

      await updateDoc(doc(db,"predBets",b.id),{status:"done"});
    }
  }

  await updateDoc(doc(db,"predictions",id),{
    status:"completed",
    correct
  });

  alert("Prediction Done 😈");
};

// WALLET
walletBtn.onclick = async ()=>{
  let ref = doc(db,"users",uemail.value.trim());
  let snap = await getDoc(ref);

  if(snap.exists()){
    let d = snap.data();
    await updateDoc(ref,{
      balance:(d.balance||0)+parseInt(amount.value)
    });
  }

  alert("Wallet Updated 💰");
};

</script>

</body>
</html>
