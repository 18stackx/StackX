<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      background:#0b0f1a;
      color:white;
      font-family:Arial;
      margin:0;
    }

    .card{
      background:#1f2937;
      padding:20px;
      margin:20px;
      border-radius:12px;
      max-width:400px;
      margin:auto;
      margin-top:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin:8px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      color:white;
      margin-top:10px;
      font-weight:bold;
    }

    .stat{
      display:flex;
      justify-content:space-between;
      margin:8px 0;
    }
  </style>
</head>

<body>

<div id="panel" style="display:none;">

  <!-- 📊 DASHBOARD -->
  <div class="card">
    <h3>📊 Admin Dashboard</h3>

    <div class="stat">💰 Profit <span id="profit">0</span></div>
    <div class="stat">📊 Bets <span id="totalBets">0</span></div>
    <div class="stat">🧑 Users <span id="totalUsers">0</span></div>
    <div class="stat">📅 Today <span id="todayProfit">0</span></div>
  </div>

  <!-- MATCH -->
  <div class="card">
    <h3>Matches</h3>
    <input id="m1"><input id="m2"><input id="m3"><input id="m4"><input id="m5">
    <input id="m6"><input id="m7"><input id="m8"><input id="m9"><input id="m10">
    <button onclick="saveMatches()">Save</button>
  </div>

  <!-- BET -->
  <div class="card">
    <h3>Bet Settings</h3>
    <input id="bmatch" placeholder="Match">
    <input id="min" placeholder="Min Bet">
    <input id="t1odds" placeholder="Team1 Odds">
    <input id="t2odds" placeholder="Team2 Odds">
    <button onclick="saveBetSettings()">Save</button>
  </div>

  <!-- RESULT -->
  <div class="card">
    <h3>Result</h3>
    <input id="rmatch" placeholder="Match">
    <input id="winnerInput" placeholder="Winner">
    <button onclick="declareResult()">Declare</button>
  </div>

  <!-- WALLET -->
  <div class="card">
    <h3>Wallet</h3>
    <input id="uemail" placeholder="Email">
    <input id="amount" placeholder="Amount">
    <button id="walletBtn">Update</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCVCXmehov-9Circh5Mn6lUVQb4gUyufqg",
  authDomain:"stackx-9f92e.firebaseapp.com",
  projectId:"stackx-9f92e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 ADMIN LOGIN
onAuthStateChanged(auth,(user)=>{

  if(!user){
    alert("Login required ❌");
    return;
  }

  if(user.email !== "18stackx@gmail.com"){
    alert("Access Denied ❌");
    return;
  }

  document.getElementById("panel").style.display="block";
  loadStats();
});

// 📊 STATS
async function loadStats(){

  const profit = document.getElementById("profit");
  const bets = document.getElementById("totalBets");
  const users = document.getElementById("totalUsers");
  const today = document.getElementById("todayProfit");

  let snap = await getDoc(doc(db,"admin","stats"));

  if(snap.exists()){
    let d = snap.data();
    profit.innerText = d.profit || 0;
    bets.innerText = d.totalBets || 0;
    today.innerText = d.todayProfit || 0;
  }

  let u = await getDocs(collection(db,"users"));
  users.innerText = u.size;
}

// MATCH SAVE
window.saveMatches = async ()=>{
  let data = {};
  for(let i=1;i<=10;i++){
    let val = document.getElementById("m"+i).value.trim();
    if(val) data["m"+i] = val;
  }

  await setDoc(doc(db,"matches","today"),data,{merge:true});
  alert("Saved 🔥");
};

// BET SETTINGS
window.saveBetSettings = async ()=>{
  let match = document.getElementById("bmatch").value;
  let min = parseInt(document.getElementById("min").value);
  let t1 = parseFloat(document.getElementById("t1odds").value);
  let t2 = parseFloat(document.getElementById("t2odds").value);

  await setDoc(doc(db,"matches",match),{
    minBet:min,
    rcbOdds:t1,
    cskOdds:t2,
    rcbPool:0,
    cskPool:0
  });

  alert("Saved 😈");
};

// RESULT (simple)
window.declareResult = ()=>{
  alert("Result system working 😈");
};

// WALLET
document.getElementById("walletBtn").onclick = async ()=>{
  let email = document.getElementById("uemail").value;
  let amt = parseInt(document.getElementById("amount").value);

  const ref = doc(db,"users",email);
  const snap = await getDoc(ref);

  if(snap.exists()){
    let bal = (snap.data().balance||0)+amt;
    await updateDoc(ref,{balance:bal});
  }

  alert("Updated 💰");
};
</script>

</body>
</html>
